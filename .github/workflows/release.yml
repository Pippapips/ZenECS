name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write   # GitHub Release 및 태그 푸시

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: |
          # For workflow_dispatch, use the input tag_name; otherwise use GITHUB_REF_NAME
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi
          VER="${TAG_NAME#v}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release version: $VER (from tag: $TAG_NAME)"

      - name: Verify package.json version == tag
        env:
          GITHUB_REF_NAME: ${{ steps.version.outputs.tag_name }}
        run: bash scripts/verify-version.sh

      - name: Sync changelog to package
        run: bash scripts/sync-changelog.sh

      - name: Commit sync (if needed)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(release): sync package CHANGELOG"
            # Push to main branch (tag triggers run in detached HEAD state)
            git push origin HEAD:main
          fi

      - name: Extract release notes from changelog
        id: notes
        run: |
          set -e
          VER="${{ steps.version.outputs.version }}"
          CHANGELOG="Docs/release/changelog.md"
          
          # Escape version for regex (e.g., 1.0.0 -> 1\.0\.0)
          VER_ESC=$(echo "$VER" | sed 's/\./\\./g')
          
          # Extract section from changelog using awk
          # Match pattern: ## [version] or ## [version] - date
          awk -v ver="$VER" -v ver_esc="$VER_ESC" '
            BEGIN {
              p=0
              found=0
            }
            /^## \[/ {
              if (p==1) exit
              # Match: ## [version] or ## [version] - anything
              if ($0 ~ "^## \\[" ver_esc "\\]") {
                p=1
                found=1
              }
            }
            p==1 {
              print
            }
            END {
              if (found==0) {
                print "Error: Version " ver " not found in changelog" > "/dev/stderr"
                exit 1
              }
            }
          ' "$CHANGELOG" > /tmp/notes.md
          
          # Check if file has meaningful content (at least 50 bytes)
          NOTES_SIZE=$(wc -c < /tmp/notes.md | tr -d ' ')
          if [ "$NOTES_SIZE" -lt 50 ]; then
            echo "⚠️ Warning: Extracted release notes are too short ($NOTES_SIZE bytes)"
            echo "Fallback: Will use GitHub auto-generated release notes"
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Release notes extracted successfully ($NOTES_SIZE bytes)"
            echo "has_notes=true" >> $GITHUB_OUTPUT
          fi
          
          echo "Release notes preview:"
          echo "---"
          head -30 /tmp/notes.md || true
          echo "---"

      - name: Add UPM installation info to release notes
        if: steps.notes.outputs.has_notes == 'true'
        run: |
          VER="${{ steps.version.outputs.version }}"
          cat >> /tmp/notes.md << EOF

---

## 📦 Installation

### Unity Package Manager (Recommended)

**Core:**
\`\`\`
https://github.com/Pippapips/ZenECS.git?path=Packages/com.zenecs.core#upm-core-${VER}
\`\`\`

**Adapter:**
\`\`\`
https://github.com/Pippapips/ZenECS.git?path=Packages/com.zenecs.adapter.unity#upm-adapter-${VER}
\`\`\`

See [Installation Guide](https://github.com/Pippapips/ZenECS/blob/main/Docs/getting-started/install-upm.md) for details.
EOF

      - name: Create GitHub Release (with custom notes)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          body_path: /tmp/notes.md
          draft: false
          prerelease: false

      - name: Create GitHub Release (auto-generated notes)
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          prerelease: false

  upm-tags:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract version from tag
        id: version
        run: |
          # Use the same tag name from prepare job
          VER="${{ needs.prepare.outputs.version }}"
          TAG_NAME="${{ needs.prepare.outputs.tag_name }}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "UPM tag version: $VER (from tag: $TAG_NAME)"

      - name: Read package versions
        id: packages
        run: |
          set -e
          CORE_JSON="Packages/com.zenecs.core/package.json"
          ADAPT_JSON="Packages/com.zenecs.adapter.unity/package.json"
          
          if ! command -v jq >/dev/null 2>&1; then
            echo "Installing jq..."
            sudo apt-get update -y && sudo apt-get install -y jq
          fi
          
          core_v=$(jq -r '.version' "$CORE_JSON")
          adapt_v=$(jq -r '.version' "$ADAPT_JSON")
          
          echo "core=$core_v" >> $GITHUB_OUTPUT
          echo "adapter=$adapt_v" >> $GITHUB_OUTPUT
          
          echo "Core version: $core_v"
          echo "Adapter version: $adapt_v"
          
          # Verify versions match release tag
          RELEASE_VER="${{ needs.prepare.outputs.version }}"
          if [ "$core_v" != "$RELEASE_VER" ]; then
            echo "⚠️ Warning: Core version ($core_v) != Release version ($RELEASE_VER)"
          fi
          if [ "$adapt_v" != "$RELEASE_VER" ]; then
            echo "⚠️ Warning: Adapter version ($adapt_v) != Release version ($RELEASE_VER)"
          fi

      - name: Create UPM Core tag
        if: ${{ steps.packages.outputs.core != '' }}
        run: |
          set -e
          CORE_SPLIT_COMMIT=$(git subtree split --prefix=Packages/com.zenecs.core)
          echo "Core split at $CORE_SPLIT_COMMIT"
          git tag -a "upm-core-${{ steps.packages.outputs.core }}" \
            -m "UPM Core v${{ steps.packages.outputs.core }} (from release ${{ github.ref_name }})" \
            "$CORE_SPLIT_COMMIT"
          git push origin "refs/tags/upm-core-${{ steps.packages.outputs.core }}"
          echo "✅ Created tag: upm-core-${{ steps.packages.outputs.core }}"

      - name: Create UPM Adapter tag
        if: ${{ steps.packages.outputs.adapter != '' }}
        run: |
          set -e
          ADAPT_SPLIT_COMMIT=$(git subtree split --prefix=Packages/com.zenecs.adapter.unity)
          echo "Adapter split at $ADAPT_SPLIT_COMMIT"
          git tag -a "upm-adapter-${{ steps.packages.outputs.adapter }}" \
            -m "UPM Adapter v${{ steps.packages.outputs.adapter }} (from release ${{ github.ref_name }})" \
            "$ADAPT_SPLIT_COMMIT"
          git push origin "refs/tags/upm-adapter-${{ steps.packages.outputs.adapter }}"
          echo "✅ Created tag: upm-adapter-${{ steps.packages.outputs.adapter }}"

      - name: Summary
        run: |
          echo "## UPM Tags Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.packages.outputs.core }}" ]; then
            echo "✅ Core: \`upm-core-${{ steps.packages.outputs.core }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${{ steps.packages.outputs.adapter }}" ]; then
            echo "✅ Adapter: \`upm-adapter-${{ steps.packages.outputs.adapter }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "These tags are used for Unity Package Manager (UPM) installation." >> $GITHUB_STEP_SUMMARY
