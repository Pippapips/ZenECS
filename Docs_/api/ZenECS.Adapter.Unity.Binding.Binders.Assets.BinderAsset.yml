  namespace: ZenECS.Adapter.Unity.Binding.Binders.Assets
  summary: Base asset for Unity-side binder configuration.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.Binding.Binders.Assets.BinderAsset" data-throw-if-not-resolved="false"></xref> is the root ScriptableObject type used by

    ZenECS binding to describe how Unity-facing binders are created and

    wired. Concrete subclasses act as configuration containers and factory

    descriptors that create binder instances per entity.

    </p>

    <p>

    The typical lifecycle is:

    </p>

    <ol><li>

    The asset is referenced by some binding configuration or blueprint.

    </li><li>

    When an entity is created, the asset's <xref href="ZenECS.Adapter.Unity.Binding.Binders.Assets.BinderAsset.Create" data-throw-if-not-resolved="false"></xref> method is

    called to allocate the concrete binder instance.

    </li><li>

    The caller attaches the returned binder to the entity or world and

    manages its disposal when the entity is destroyed.

    </li></ol>

    <p>

    At runtime, higher-level binding code or systems are responsible for:

    </p>

    <ul><li>Interpreting the configuration stored in the asset.</li><li>Instantiating the appropriate binder objects.</li><li>Managing their lifetime alongside ECS entities or worlds.</li></ul>
  example: []
  syntax:
    content: 'public abstract class BinderAsset : ScriptableObject'
    content.vb: Public MustInherit Class BinderAsset Inherits ScriptableObject
