    startLine: 91
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Binding.Binders.Assets
  summary: Creates a new binder instance for an entity.
  remarks: >-
    <p>

    This method does not automatically attach the binder to any entity

    or world. The caller is responsible for:

    </p>

    <ul><li>Associating the binder with the target entity.</li><li>Registering it with any relevant systems or worlds.</li><li>Disposing it when the owning entity is destroyed.</li></ul>
  example: []
  syntax:
    content: public abstract IBinder Create()
    return:
      type: ZenECS.Core.Binding.IBinder
      description: >-
        A newly created <xref href="ZenECS.Core.Binding.IBinder" data-throw-if-not-resolved="false"></xref> instance that is intended to

        be owned by a single entity.
    content.vb: Public MustOverride Function Create() As IBinder
  overload: ZenECS.Adapter.Unity.Binding.Binders.Assets.BinderAsset.Create*
