    path: ../Packages/com.zenecs.core/Runtime/Execution/Kernel/IKernel.cs
    startLine: 36
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Kernel lifecycle and multi-world management interface.
  remarks: >-
    <p>

    Adapters (Unity, Godot, custom engines, etc.) create a kernel instance,

    start it, create worlds, and drive the three main ticks:

    <xref href="ZenECS.Core.IKernel.BeginFrame(System.Single)" data-throw-if-not-resolved="false"></xref>, <xref href="ZenECS.Core.IKernel.FixedStep(System.Single)" data-throw-if-not-resolved="false"></xref>,

    and <xref href="ZenECS.Core.IKernel.LateFrame(System.Single)" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    External code should not mutate world state by reaching inside the kernel

    implementation; always use the public APIs exposed by <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: 'public interface IKernel : IDisposable'
    content.vb: Public Interface IKernel Inherits IDisposable
  inheritedMembers:
  - System.IDisposable.Dispose
