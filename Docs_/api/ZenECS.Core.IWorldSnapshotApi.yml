  namespace: ZenECS.Core
  summary: Snapshot I/O surface for saving and restoring entire world state.
  remarks: >-
    <p>

    Implementations are responsible for emitting a stable, portable binary format

    that can be loaded across process runs (and, ideally, platforms), including a

    versioned magic header to detect incompatibilities early.

    </p>

    <p>

    A snapshot is expected to capture:

    </p>

    <ul><li>Entity metadata (next id, generations, free list, alive mask).</li><li>All component pools and their per-entity values.</li><li>Any additional world-level state required for correct restore.</li></ul>
  example: []
  syntax:
    content: public interface IWorldSnapshotApi
    content.vb: Public Interface IWorldSnapshotApi
