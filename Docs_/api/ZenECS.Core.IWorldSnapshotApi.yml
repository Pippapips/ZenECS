  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Loads a complete snapshot from the given stream and replaces in-memory state.
  remarks: >-
    <p>

    Implementations should:

    </p>

    <ul><li>Validate the magic header and version.</li><li>Restore entity metadata and rebuild alive/free lists.</li><li>Clear existing component pools before repopulating them.</li><li>Run any registered post-load migrations after data is restored.</li></ul>

    <p>

    The stream is not closed by this call; lifetime management remains with the caller.

    </p>
  example: []
  syntax:
    content: void LoadFullSnapshotBinary(Stream s)
    parameters:
    - id: s
      type: System.IO.Stream
      description: Readable stream that provides the snapshot bytes.
    content.vb: Sub LoadFullSnapshotBinary(s As Stream)
