  summary: Saves a complete snapshot of the world into the given stream.
  remarks: >-
    <p>

    Implementations should:

    </p>

    <ul><li>Write a magic header and version tag.</li><li>Encode metadata such as NextId, Generation[], FreeIds[], AliveBits.</li><li>Serialize each component pool using the configured formatter set.</li></ul>

    <p>

    The stream is not closed by this call; lifetime management remains with the caller.

    </p>
  example: []
