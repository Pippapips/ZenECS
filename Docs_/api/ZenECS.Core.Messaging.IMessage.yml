  namespace: ZenECS.Core.Messaging
  summary: Marker interface for messages that can be published on the world message bus.
  remarks: >-
    <p>

    All messages flowing through <xref href="ZenECS.Core.IWorldMessagesApi" data-throw-if-not-resolved="false"></xref> are required

    to be value types (<code>struct</code>) that also implement this interface.

    </p>

    <p>

    Using value types keeps GC pressure low and makes it cheap to broadcast

    small, frequently published messages such as events, commands, and

    notifications between systems.

    </p>
  example: []
