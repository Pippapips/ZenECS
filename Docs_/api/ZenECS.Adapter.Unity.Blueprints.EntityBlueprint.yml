- uid: ZenECS.Adapter.Unity.Blueprints.EntityBlueprint.Spawn(ZenECS.Core.IWorld,ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver,System.Action{ZenECS.Core.Entity})
  commentId: M:ZenECS.Adapter.Unity.Blueprints.EntityBlueprint.Spawn(ZenECS.Core.IWorld,ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver,System.Action{ZenECS.Core.Entity})
  id: Spawn(ZenECS.Core.IWorld,ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver,System.Action{ZenECS.Core.Entity})
  parent: ZenECS.Adapter.Unity.Blueprints.EntityBlueprint
  langs:
  - csharp
  - vb
  name: Spawn(IWorld, ISharedContextResolver?, Action<Entity>?)
  nameWithType: EntityBlueprint.Spawn(IWorld, ISharedContextResolver?, Action<Entity>?)
  fullName: ZenECS.Adapter.Unity.Blueprints.EntityBlueprint.Spawn(ZenECS.Core.IWorld, ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver?, System.Action<ZenECS.Core.Entity>?)
  type: Method
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/Blueprints/EntityBlueprint.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: Spawn
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Blueprints/EntityBlueprint.cs
    startLine: 130
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: >-
    Spawns an entity and applies the blueprint's component snapshot,

    contexts, and binders.
  remarks: >-
    <p>

    This method enqueues an <xref href="ZenECS.Core.ExternalCommand.CreateEntity(System.Action%7bZenECS.Core.Entity%2cZenECS.Core.ICommandBuffer%7d)" data-throw-if-not-resolved="false"></xref>

    into the world rather than creating the entity immediately. The

    actual creation and attachment happen when the world's external

    command queue is processed.

    </p>

    <p>

    The spawn pipeline inside the command:

    </p>

    <ol><li>

    Applies the component snapshot via <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.ApplyTo(ZenECS.Core.IWorld%2cZenECS.Core.Entity%2cZenECS.Core.ICommandBuffer)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    Registers contexts from <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprint._contextAssets" data-throw-if-not-resolved="false"></xref>:

    <ul><li>

    <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset" data-throw-if-not-resolved="false"></xref>: resolved via

    a shared context resolver and registered using

    <xref href="ZenECS.Core.IWorldContextApi.RegisterContext(ZenECS.Core.Entity%2cZenECS.Core.Binding.IContext)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.PerEntityContextAsset" data-throw-if-not-resolved="false"></xref>: creates a fresh context and

    registers it for the entity.

    </li></ul>

    </li><li>

    Creates binders from <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprint._binderAssets" data-throw-if-not-resolved="false"></xref>: each

    <xref href="ZenECS.Adapter.Unity.Binding.Binders.Assets.BinderAsset" data-throw-if-not-resolved="false"></xref> creates a fresh binder and attaches it

    to the entity.

    </li><li>

    Invokes <code class="paramref">onCreated</code> if provided.

    </li></ol>
  example: []
  syntax:
    content: public void Spawn(IWorld world, ISharedContextResolver? sharedContextResolver, Action<Entity>? onCreated = null)
    parameters:
    - id: world
      type: ZenECS.Core.IWorld
      description: Target <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> where the new entity will be created.
    - id: sharedContextResolver
      type: ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver
      description: >-
        Optional shared-context resolver used to resolve

        <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset" data-throw-if-not-resolved="false"></xref> markers into concrete

        <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instances. When <code>null</code>, shared context

        markers are ignored.
    - id: onCreated
      type: System.Action{ZenECS.Core.Entity}
      description: >-
        Optional callback invoked after the entity has been created and all

        components, contexts, and binders have been applied.
    content.vb: Public Sub Spawn(world As IWorld, sharedContextResolver As ISharedContextResolver, onCreated As Action(Of Entity) = Nothing)
