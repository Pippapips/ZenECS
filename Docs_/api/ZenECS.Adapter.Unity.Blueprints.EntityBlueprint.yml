  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Unity-side blueprint for spawning preconfigured entities.
  remarks: >-
    <p>

    An <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprint" data-throw-if-not-resolved="false"></xref> captures a snapshot of ECS component

    data (<xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData" data-throw-if-not-resolved="false"></xref>), plus a set of context assets

    and binders that should be attached when the entity is created.

    </p>

    <p>

    Typical usage:

    </p>

    <ol><li>

    Author the component snapshot and contexts in the inspector.

    </li><li>

    At runtime, call <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprint.Spawn(ZenECS.Core.IWorld%2cZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver%2cSystem.Action%7bZenECS.Core.Entity%7d)" data-throw-if-not-resolved="false"></xref> with a target world to enqueue

    creation of the entity and application of the snapshot.

    </li><li>

    Optionally use a shared context resolver to resolve

    shared contexts when spawning.

    </li></ol>
  example: []
  syntax:
    content: >-
      [CreateAssetMenu(menuName = "ZenECS/Entity Blueprint", fileName = "EntityBlueprint")]

      public sealed class EntityBlueprint : ScriptableObject
    content.vb: >-
