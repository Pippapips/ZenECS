  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: >-
    A safe, serializable reference to a world.

    The handle keeps only the <code>(IKernel, WorldId)</code> pair and resolves the

    current live <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> via the kernel when needed.
  remarks: >-
    <p>

    <b>Why a handle?</b> Storing direct <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> references is unsafe

    across destruction or re-creation. <xref href="ZenECS.Core.WorldHandle" data-throw-if-not-resolved="false"></xref> guarantees that

    callers explicitly resolve the world through <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref>, which

    prevents use-after-dispose and supports multi-world identity.

    </p>

    <p>

    <b>Typical usage</b>


    <pre><code class="lang-csharp">// Store identity only (safe to serialize).

    var handle = new WorldHandle(kernel, world.Id);


    // Later in a system or adapter:

    if (handle.TryResolve(out var w))

    {
        // Use the world
    }

    // or

    var w2 = handle.ResolveOrThrow(); // throws if not alive</code></pre>

    </p>
  example: []
  syntax:
    content: 'public readonly struct WorldHandle : IEquatable<WorldHandle>'
    content.vb: Public Structure WorldHandle Implements IEquatable(Of WorldHandle)
