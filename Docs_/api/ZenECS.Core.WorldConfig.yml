  summary: Create a new world configuration with sensible bounds.
  example: []
  syntax:
    content: public WorldConfig(int initialEntityCapacity = 256, int initialPoolBuckets = 256, int initialBinderBuckets = 1024, int initialBinderPerEntityBuckets = 4, int initialFreeIdCapacity = 128, GrowthPolicy growthPolicy = GrowthPolicy.Doubling, int growthStep = 256)
    parameters:
    - id: initialEntityCapacity
      type: System.Int32
      description: Entity slots; clamped to ≥ 16.
    - id: initialPoolBuckets
      type: System.Int32
      description: Pool dictionary buckets; clamped to ≥ 16.
    - id: initialBinderBuckets
      type: System.Int32
      description: Binder registry buckets; clamped to ≥ 16.
    - id: initialBinderPerEntityBuckets
      type: System.Int32
      description: Per-entity binder buckets; clamped to ≥ 4.
    - id: initialFreeIdCapacity
      type: System.Int32
      description: Free-id stack capacity; clamped to ≥ 16.
    - id: growthPolicy
      type: ZenECS.Core.GrowthPolicy
      description: >-
        Resize strategy:

        <xref href="ZenECS.Core.GrowthPolicy.Doubling" data-throw-if-not-resolved="false"></xref> or

        <xref href="ZenECS.Core.GrowthPolicy.Step" data-throw-if-not-resolved="false"></xref>.
    - id: growthStep
      type: System.Int32
      description: Slots added per expansion when using Step; clamped to ≥ 32.
