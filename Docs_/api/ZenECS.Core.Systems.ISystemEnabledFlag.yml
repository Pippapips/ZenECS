  namespace: ZenECS.Core.Systems
  summary: Optional enable/disable flag for systems.
  remarks: >-
    <p>

    Systems that implement this interface allow tooling and infrastructure

    code to toggle their active state without removing them from the world.

    </p>

    <p>

    System runners should honor this flag and skip execution when

    <xref href="ZenECS.Core.Systems.ISystemEnabledFlag.Enabled" data-throw-if-not-resolved="false"></xref> is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.

    </p>
  example: []
  syntax:
    content: public interface ISystemEnabledFlag
    content.vb: Public Interface ISystemEnabledFlag
