  summary: Gets or sets a value indicating whether the system is enabled.
  remarks: >-
    When set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>, the system should not be executed

    by the scheduler or system runner.
