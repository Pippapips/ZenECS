  summary: >-
    Core utility for creating objects with a type-specific default when available.

    If a public static field named <code>Default</code> exists and matches the declaring type,

    it will be used; otherwise <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref> is used.
