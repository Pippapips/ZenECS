    path: ../Packages/com.zenecs.core/Runtime/Deterministic/ICommandBuffer.cs
    startLine: 52
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Marks the end of the write phase for this buffer.
  remarks: >-
    <p>

    After calling <xref href="ZenECS.Core.ICommandBuffer.EndWrite" data-throw-if-not-resolved="false"></xref>, no further commands may be recorded.

    The buffer is queued for application at the next world barrier.

    </p>

    <p>

    <xref href="System.IDisposable.Dispose" data-throw-if-not-resolved="false"></xref> should typically call <xref href="ZenECS.Core.ICommandBuffer.EndWrite" data-throw-if-not-resolved="false"></xref>

    if it has not been called already.

    </p>
  example: []
  syntax:
    content: void EndWrite()
    content.vb: Sub EndWrite()
  overload: ZenECS.Core.ICommandBuffer.EndWrite*
