    startLine: 37
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Records structural and value mutations to be applied later at a world barrier.
  remarks: >-
    <p>

    A command buffer is always bound to a single <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> and never

    applies mutations immediately; all recorded operations are applied by the

    runner/worker at a deterministic tick boundary.

    </p>

    <p>

    Systems must not call world mutation APIs directly. Instead, they obtain

    a buffer via <xref href="ZenECS.Core.IWorldCommandBufferApi.BeginWrite" data-throw-if-not-resolved="false"></xref> and record

    all entity/component/singleton changes through this interface.

    </p>

    <p>

    Implementations must treat the buffer as single-use: once

    <xref href="ZenECS.Core.ICommandBuffer.EndWrite" data-throw-if-not-resolved="false"></xref> is called (or the buffer is disposed), no further

    commands may be recorded.

    </p>
  example: []
  syntax:
    content: 'public interface ICommandBuffer : IDisposable'
    content.vb: Public Interface ICommandBuffer Inherits IDisposable
  inheritedMembers:
  - System.IDisposable.Dispose
