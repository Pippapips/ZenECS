    path: ../Packages/com.zenecs.adapter.unity/Runtime/Linking/EntityViewRegistry.cs
    startLine: 67
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: Cleans up the registry for a specific world that is being disposed.
  remarks: >-
    <p>

    This method should be called when a world is being disposed to ensure

    that all entity links registered for that world are properly cleaned up.

    It clears all entries in the registry's internal dictionary.

    </p>

    <p>

    The <xref href="System.Runtime.CompilerServices.ConditionalWeakTable%602" data-throw-if-not-resolved="false"></xref> will automatically remove the

    registry entry when the world is garbage collected, but calling this

    method ensures immediate cleanup of the dictionary contents.

    </p>
  example: []
  syntax:
    content: public static void CleanupWorld(IWorld world)
    parameters:
    - id: world
      type: ZenECS.Core.IWorld
      description: The world whose registry should be cleaned up.
    content.vb: Public Shared Sub CleanupWorld(world As IWorld)
  overload: ZenECS.Adapter.Unity.Linking.EntityViewRegistry.CleanupWorld*
