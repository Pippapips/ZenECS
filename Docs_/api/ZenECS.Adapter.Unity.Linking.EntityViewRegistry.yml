  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/Linking/EntityViewRegistry.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: CleanupDeadWorlds
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Linking/EntityViewRegistry.cs
    startLine: 99
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: Cleans up registries for worlds that are no longer referenced.
  remarks: >-
    <p>

    <b>Note:</b> This method currently performs no operation because

    <xref href="System.Runtime.CompilerServices.ConditionalWeakTable%602" data-throw-if-not-resolved="false"></xref> automatically removes entries when

    the key (world) is garbage collected. The method is provided for API

    consistency and potential future extensibility.

    </p>

    <p>

    <xref href="System.Runtime.CompilerServices.ConditionalWeakTable%602" data-throw-if-not-resolved="false"></xref> does not expose a way to enumerate

    keys, so manual cleanup of dead entries is not possible. The garbage

    collector handles cleanup automatically when worlds are no longer

    referenced.

    </p>

    <p>

    For cleaning up a specific world's registry immediately, use

    <xref href="ZenECS.Adapter.Unity.Linking.EntityViewRegistry.CleanupWorld(ZenECS.Core.IWorld)" data-throw-if-not-resolved="false"></xref> instead.

    </p>
  example: []
  syntax:
    content: public static void CleanupDeadWorlds()
    content.vb: Public Shared Sub CleanupDeadWorlds()
  overload: ZenECS.Adapter.Unity.Linking.EntityViewRegistry.CleanupDeadWorlds*
