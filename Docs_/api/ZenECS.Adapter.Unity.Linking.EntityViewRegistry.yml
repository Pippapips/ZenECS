  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: Static entry point for obtaining per-world view registries.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.Linking.EntityViewRegistry" data-throw-if-not-resolved="false"></xref> maintains a

    <xref href="System.Runtime.CompilerServices.ConditionalWeakTable%602" data-throw-if-not-resolved="false"></xref> that associates

    <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> instances with their own <xref href="ZenECS.Adapter.Unity.Linking.EntityViewRegistry.Registry" data-throw-if-not-resolved="false"></xref>.

    The registry stores mappings from <xref href="ZenECS.Core.Entity" data-throw-if-not-resolved="false"></xref> to

    <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref> so that view components can be resolved

    efficiently at runtime.

    </p>
  example: []
  syntax:
    content: public static class EntityViewRegistry
    content.vb: Public Module EntityViewRegistry
