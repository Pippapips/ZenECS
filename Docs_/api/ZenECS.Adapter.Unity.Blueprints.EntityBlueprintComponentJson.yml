  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Deserializes a JSON snapshot string back into a component instance.
  remarks: >-
    <p>

    The method uses <xref href="ZenECS.Core.ZenDefaults.CreateWithDefaults(System.Type)" data-throw-if-not-resolved="false"></xref> to

    construct the instance, then attempts to restore each field. Any

    individual field failures are caught and ignored so that a partially

    valid snapshot still yields a usable component.

    </p>
  example: []
  syntax:
    content: public static object? Deserialize(string? json, Type t)
    parameters:
    - id: json
      type: System.String
      description: >-
        JSON text produced by <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintComponentJson.Serialize(System.Object%2cSystem.Type)" data-throw-if-not-resolved="false"></xref>, or <code>null</code> to

        return a default instance.
    - id: t
      type: System.Type
      description: Target component type to construct.
    return:
      type: System.Object
      description: >-
        A new object of type <code class="paramref">t</code> with supported public

        fields populated from <code class="paramref">json</code>, or a default

        instance when <code class="paramref">json</code> is <code>null</code> or invalid.
    content.vb: Public Shared Function Deserialize(json As String, t As Type) As Object
