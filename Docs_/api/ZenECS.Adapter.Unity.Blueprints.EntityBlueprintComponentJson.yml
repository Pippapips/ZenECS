  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Serializes a component instance into a JSON snapshot string.
  remarks: >-
    <p>

    Unsupported field types are silently skipped. The method only

    inspects public instance fields (no properties or non-public fields).

    </p>
  example: []
  syntax:
    content: public static string Serialize(object instance, Type t)
    parameters:
    - id: instance
      type: System.Object
      description: >-
        Component instance to serialize. Expected to be a struct or class

        containing public instance fields.
    - id: t
      type: System.Type
      description: Runtime type of the component instance.
    return:
      type: System.String
      description: >-
        A JSON string that encodes a <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintComponentJson.Snapshot" data-throw-if-not-resolved="false"></xref> object,

        suitable for storage in <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function Serialize(instance As Object, t As Type) As String
