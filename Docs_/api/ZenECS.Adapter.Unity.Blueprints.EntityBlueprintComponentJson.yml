  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Utility for serializing and deserializing component snapshots as JSON.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintComponentJson" data-throw-if-not-resolved="false"></xref> converts component instances

    into a lightweight JSON snapshot format that is compatible with

    <xref href="UnityEngine.JsonUtility" data-throw-if-not-resolved="false"></xref>. The snapshot stores:

    </p>

    <ul><li>The component's assembly-qualified type name.</li><li>A list of public instance fields and their values.</li></ul>

    <p>

    The format supports a subset of commonly used field types, including:

    primitive numeric and boolean types, strings, <xref href="Unity.Collections.FixedString64Bytes" data-throw-if-not-resolved="false"></xref>,

    Unity vector/quaternion/color types, <xref href="UnityEngine.GameObject" data-throw-if-not-resolved="false"></xref>, and

    several <code>Unity.Mathematics</code> structs.

    </p>
  example: []
  syntax:
    content: public static class EntityBlueprintComponentJson
    content.vb: Public Module EntityBlueprintComponentJson
