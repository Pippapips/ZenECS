    startLine: 88
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: Detaches this GameObject from its current world/entity link.
  remarks: >-
    <p>

    If the link is registered in a world view registry, it will be

    unregistered. After detaching, <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.World" data-throw-if-not-resolved="false"></xref> will be

    <code>null</code> and <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.Entity" data-throw-if-not-resolved="false"></xref> will be reset to its default.

    </p>
  example: []
  syntax:
    content: public void Detach()
    content.vb: Public Sub Detach()
  overload: ZenECS.Adapter.Unity.Linking.EntityLink.Detach*
