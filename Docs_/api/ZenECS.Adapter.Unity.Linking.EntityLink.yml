  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: Attaches this link to a given world and entity.
  remarks: >-
    <p>

    If the link was previously attached to a different world or entity,

    it will be unregistered from the old world's view registry before

    being registered with the new one.

    </p>
  example: []
  syntax:
    content: public void Attach(IWorld w, in Entity e)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: The world that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: The entity to link to this GameObject.
    content.vb: Public Sub Attach(w As IWorld, e As Entity)
