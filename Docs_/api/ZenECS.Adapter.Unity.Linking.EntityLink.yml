  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: MonoBehaviour that links a Unity <xref href="UnityEngine.GameObject" data-throw-if-not-resolved="false"></xref> to a ZenECS entity.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref> stores a reference to an <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> and

    the corresponding <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.Entity" data-throw-if-not-resolved="false"></xref>. When attached, it automatically

    registers itself in <xref href="ZenECS.Adapter.Unity.Linking.EntityViewRegistry" data-throw-if-not-resolved="false"></xref> for that world, and

    unregisters when detached or destroyed.

    </p>

    <p>

    This component is intended to be unique per GameObject, enforced by

    <xref href="UnityEngine.DisallowMultipleComponentAttribute" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: 'public sealed class EntityLink : MonoBehaviour'
    content.vb: Public NotInheritable Class EntityLink Inherits MonoBehaviour
