- uid: ZenECS.Adapter.Unity.DI.ProjectInstaller
  commentId: T:ZenECS.Adapter.Unity.DI.ProjectInstaller
  id: ProjectInstaller
  parent: ZenECS.Adapter.Unity.DI
  children: []
  langs:
  - csharp
  - vb
  name: ProjectInstaller
  nameWithType: ProjectInstaller
  fullName: ZenECS.Adapter.Unity.DI.ProjectInstaller
  type: Class
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/DI/ProjectInstaller.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: ProjectInstaller
    path: ../Packages/com.zenecs.adapter.unity/Runtime/DI/ProjectInstaller.cs
    startLine: 56
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.DI
  summary: Zenject-based project installer for ZenECS.
  remarks: >-
    <p>

    When the <code>ZENECS_ZENJECT</code> scripting define is enabled, this

    <xref href="ZenECS.Adapter.Unity.DI.ProjectInstaller" data-throw-if-not-resolved="false"></xref> is used as a Zenject MonoInstaller to:

    </p>

    <ol><li>

    Create the global <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref> via

    <xref href="ZenECS.Adapter.Unity.KernelLocator.CreateEcsDriverWithKernel(ZenECS.Core.KernelOptions%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    Bind the kernel and shared service resolvers into the Zenject container.

    </li><li>

    Expose the resolved services through <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge" data-throw-if-not-resolved="false"></xref>

    for convenient access by editor tooling and runtime code.

    </li></ol>
  example: []
  syntax:
    content: >-
      [DefaultExecutionOrder(-32001)]

      public sealed class ProjectInstaller : MonoBehaviour
    content.vb: >-
      <DefaultExecutionOrder(-32001)>

      Public NotInheritable Class ProjectInstaller Inherits MonoBehaviour
