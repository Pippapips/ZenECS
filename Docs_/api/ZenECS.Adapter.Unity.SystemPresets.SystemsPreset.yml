    id: GetValidTypes
    path: ../Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/SystemPreset.cs
    startLine: 84
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: Enumerates all valid <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> types referenced by this preset.
  remarks: >-
    <p>

    A type is considered valid if:

    </p>

    <ul><li>

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef.Resolve" data-throw-if-not-resolved="false"></xref> returns a non-null <xref href="System.Type" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    The type is not abstract.

    </li><li>

    The type is assignable to <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref>.

    </li></ul>
  example: []
  syntax:
    content: public IEnumerable<Type> GetValidTypes()
    return:
      type: System.Collections.Generic.IEnumerable{System.Type}
      description: >-
        A sequence of concrete, non-abstract types that implement

        <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> and can safely be instantiated.
    content.vb: Public Function GetValidTypes() As IEnumerable(Of Type)
  overload: ZenECS.Adapter.Unity.SystemPresets.SystemsPreset.GetValidTypes*
