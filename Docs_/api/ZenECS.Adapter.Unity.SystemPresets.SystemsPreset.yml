  fullName: ZenECS.Adapter.Unity.SystemPresets.SystemsPreset.systemTypes
  type: Field
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/SystemPreset.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: systemTypes
    path: ../Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/SystemPreset.cs
    startLine: 59
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: List of system type references that this preset provides.
  remarks: >-
    <p>

    At runtime, each <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef" data-throw-if-not-resolved="false"></xref> is resolved via

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef.Resolve" data-throw-if-not-resolved="false"></xref> and filtered for validity by

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset.GetValidTypes" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    In the editor, Unity's OnValidate performs additional cleanup:

    it preserves empty slots for future selection while removing

    invalid or duplicate entries.

    </p>
  example: []
  syntax:
    content: >-
      [Header("Systems")]

      [Tooltip("ISystem implementation types (runtime-safe).")]

      [SystemTypeFilter(typeof(ISystem), false)]

      public SystemTypeRef[]? systemTypes
    return:
      type: ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef[]
    content.vb: >-
      <Header("Systems")>

      <Tooltip("ISystem implementation types (runtime-safe).")>

      <SystemTypeFilter(GetType(ISystem), False)>

      Public systemTypes As SystemTypeRef()
