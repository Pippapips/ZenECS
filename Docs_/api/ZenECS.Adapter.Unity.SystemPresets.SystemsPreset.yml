  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: ScriptableObject preset that holds a list of <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> types.
  remarks: >-
    <p>

    A <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset" data-throw-if-not-resolved="false"></xref> is typically referenced by world

    installers (for example, <code>WorldSystemInstaller</code>) to contribute a

    set of systems that should be created and added to a world.

    </p>

    <p>

    Each entry in <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset.systemTypes" data-throw-if-not-resolved="false"></xref> is a <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef" data-throw-if-not-resolved="false"></xref>

    that resolves to a concrete <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> implementation type.

    The preset provides <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset.GetValidTypes" data-throw-if-not-resolved="false"></xref> to enumerate only those

    types that are resolvable, non-abstract, and assignable to

    <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: >-
      [CreateAssetMenu(fileName = "SystemsPreset", menuName = "ZenECS/Systems Preset")]

      public sealed class SystemsPreset : ScriptableObject
    content.vb: >-
      <CreateAssetMenu(fileName:="SystemsPreset", menuName:="ZenECS/Systems Preset")>

      Public NotInheritable Class SystemsPreset Inherits ScriptableObject
