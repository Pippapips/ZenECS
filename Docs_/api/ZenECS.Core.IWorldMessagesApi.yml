  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Publishes a message instance to all subscribers of type <code class="typeparamref">T</code>.
  remarks: >-
    <p>

    All currently subscribed handlers for <code class="typeparamref">T</code> will be

    invoked (typically in subscription order). Implementations are free

    to guard against re-entrancy according to their internal policy.

    </p>

    <p>

    Message publishing is per-world: only subscribers attached to this

    world's bus will receive <code class="paramref">msg</code>.

    </p>
  example: []
  syntax:
    content: 'void Publish<T>(in T msg) where T : struct, IMessage'
    parameters:
    - id: msg
      type: '{T}'
      description: Message instance to publish.
    typeParameters:
    - id: T
      description: >-
        Message value type. Must be a <code>struct</code> that implements

        <xref href="ZenECS.Core.Messaging.IMessage" data-throw-if-not-resolved="false"></xref>.
    content.vb: Sub Publish(Of T As {Structure, IMessage})(msg As T)
