  namespace: ZenECS.Core
  summary: Subscribes a handler to messages of type <code class="typeparamref">T</code>.
  remarks: >-
    <p>

    Handlers are typically invoked synchronously in the context of the

    system that calls <xref href="ZenECS.Core.IWorldMessagesApi.Publish%60%601(%60%600%40)" data-throw-if-not-resolved="false"></xref>. Implementations may

    choose to buffer or defer invocation, but this is not guaranteed.

    </p>

    <p>

    Callers are responsible for holding on to the returned disposable

    and disposing it when the subscription is no longer needed

    (for example, when a system is removed or a view is destroyed).

    </p>
  example: []
  syntax:
    content: 'IDisposable Subscribe<T>(Action<T> handler) where T : struct, IMessage'
    parameters:
    - id: handler
      type: System.Action{{T}}
      description: >-
        Delegate to invoke for each published message of type

        <code class="typeparamref">T</code>. Must not be <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    typeParameters:
    - id: T
      description: >-
        Message value type. Must be a <code>struct</code> that implements

        <xref href="ZenECS.Core.Messaging.IMessage" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.IDisposable
      description: >-
        An <xref href="System.IDisposable" data-throw-if-not-resolved="false"></xref> token that can be used to unsubscribe.

        Disposing the token should remove the handler from the bus.
    content.vb: Function Subscribe(Of T As {Structure, IMessage})(handler As Action(Of T)) As IDisposable
