  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Per-world publish/subscribe surface for lightweight struct messages.
  remarks: >-
    <p>

    Each world has its own isolated message bus; messages never leak between

    different worlds. This makes the API safe to use in multi-world setups

    (for example, gameplay, replay, and spectator worlds running in parallel).

    </p>

    <p>

    The message bus is intentionally minimal:

    </p>

    <ul><li>

    Messages are value types implementing <xref href="ZenECS.Core.Messaging.IMessage" data-throw-if-not-resolved="false"></xref>.
      </li><li>
    Subscribers are <xref href="System.Action%601" data-throw-if-not-resolved="false"></xref> delegates invoked synchronously

    when a message is published.
      </li><li>
    Subscriptions are represented by <xref href="System.IDisposable" data-throw-if-not-resolved="false"></xref> tokens, making

    unsubscription explicit and deterministic.
      </li></ul>
  example: []
  syntax:
    content: public interface IWorldMessagesApi
    content.vb: Public Interface IWorldMessagesApi
