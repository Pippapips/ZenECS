  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Begins recording a new command buffer bound to this world.
  remarks: >-
    <p>

    The returned buffer never applies mutations immediately; it only

    records operations that will later be applied at a deterministic

    barrier by the runner/worker.

    </p>
  example: []
  syntax:
    content: ICommandBuffer BeginWrite()
    return:
      type: ZenECS.Core.ICommandBuffer
      description: A new command buffer bound to the world.
    content.vb: Function BeginWrite() As ICommandBuffer
