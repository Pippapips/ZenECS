  namespace: ZenECS.Core.Binding
  summary: >-
    Determines whether a context of type <code class="typeparamref">T</code> exists

    for the specified entity in the given world.
  example: []
  syntax:
    content: 'bool Has<T>(IWorld w, Entity e) where T : class, IContext'
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity to query for the context.
    typeParameters:
    - id: T
      description: Concrete context type to check.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if a context of type <code class="typeparamref">T</code>

        is registered for the entity; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
