  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Determines whether an <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instance assignable to

    <code class="paramref">contextType</code> is registered for the specified entity.
  remarks: >-
    This uses type compatibility

    (e.g. <code>contextType.IsInstanceOfType(instance)</code>), so derived

    or implementing context types will also match.
  example: []
  syntax:
    content: bool Has(IWorld w, Entity e, Type? contextType)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity to query for the context.
    - id: contextType
      type: System.Type
      description: >-
        Target type to check for. If <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, this always

        returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if a context instance compatible with

        <code class="paramref">contextType</code> is registered; otherwise

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function Has(w As IWorld, e As Entity, contextType As Type) As Boolean
  overload: ZenECS.Core.Binding.IContextLookup.Has*
