  summary: >-
    Gets a read-only list of all contexts currently registered for

    the specified entity in the given world.
  example: []
  syntax:
    content: IReadOnlyList<IContext>? GetAllContextList(IWorld w, Entity e)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity to query for contexts.
    return:
      type: System.Collections.Generic.IReadOnlyList{ZenECS.Core.Binding.IContext}
      description: >-
        A read-only list of <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instances, or

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> if no contexts are registered.
