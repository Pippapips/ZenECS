  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Returns an array of all contexts currently registered for the

    specified entity in the given world, with each item containing

    the runtime type and boxed instance.
  example: []
  syntax:
    content: (Type type, object boxed)[] GetAllContexts(IWorld w, Entity e)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity to query for contexts.
    return:
      type: System.ValueTuple{System.Type,System.Object}[]
      description: >-
        An array of pairs where <code>type</code> is the context's runtime

        <xref href="System.Type" data-throw-if-not-resolved="false"></xref> and <code>boxed</code> is the context instance.
    content.vb: Function GetAllContexts(w As IWorld, e As Entity) As (type As Type, boxed As Object)()
