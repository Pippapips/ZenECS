  summary: >-
    Attempts to get a context of type <code class="typeparamref">T</code> for the

    specified entity in the given world.
  example: []
  syntax:
    content: 'bool TryGet<T>(IWorld w, Entity e, out T ctx) where T : class, IContext'
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity to query for the context.
    - id: ctx
      type: '{T}'
      description: >-
        When this method returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, contains the

        context instance; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    typeParameters:
    - id: T
      description: Concrete context type to retrieve.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the context exists and was returned;

        otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
