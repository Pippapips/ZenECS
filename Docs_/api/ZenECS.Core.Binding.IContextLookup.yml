  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Determines whether the exact context instance <code class="paramref">ctx</code>

    is registered for the specified entity in the given world.

    Uses reference equality.
  example: []
  syntax:
    content: bool Has(IWorld w, Entity e, IContext? ctx)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity to query for the context.
    - id: ctx
      type: ZenECS.Core.Binding.IContext
      description: The exact context instance to test. May be <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the given instance is registered for the

        entity; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
