    parameters:
    - id: enabled
      type: System.Boolean
      description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to enable the system; <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to disable it.
    typeParameters:
    - id: T
      description: System type that must implement <xref href="ZenECS.Core.Systems.ISystemEnabledFlag" data-throw-if-not-resolved="false"></xref>.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if a system of type <code class="typeparamref">T</code> was found

