  summary: Enables or disables execution of the first active system of type <code class="typeparamref">T</code>.
  remarks: >-
    The system must implement <xref href="ZenECS.Core.Systems.ISystemEnabledFlag" data-throw-if-not-resolved="false"></xref>. Systems that are

    disabled will be skipped during execution by the system runner.
  example: []
  syntax:
