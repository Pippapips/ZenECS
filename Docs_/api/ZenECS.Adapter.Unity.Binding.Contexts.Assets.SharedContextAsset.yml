  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Binding.Contexts.Assets
  summary: Gets the concrete shared context type represented by this asset.
  remarks: >-
    <p>

    The returned value is typically something like

    <code>typeof(UIRootContext)</code>, and is used by binding pipelines or

    tooling to discover which shared context is being referenced without

    needing to instantiate it.

    </p>
  example: []
  syntax:
    content: public abstract Type ContextType { get; }
    parameters: []
    return:
      type: System.Type
    content.vb: Public MustOverride ReadOnly Property ContextType As Type
