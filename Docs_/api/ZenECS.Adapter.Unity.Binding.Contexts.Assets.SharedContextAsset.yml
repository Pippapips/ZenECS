  namespace: ZenECS.Adapter.Unity.Binding.Contexts.Assets
  summary: Base asset for shared (global) context markers.
  remarks: >-
    <p>

    A <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset" data-throw-if-not-resolved="false"></xref> represents a shared context that is

    typically instantiated once and reused across multiple entities, views,

    or systems. Examples include:

    </p>

    <ul><li>A UI root context managing global UI state.</li><li>Application-wide services or singletons.</li><li>

    Cross-cutting contexts referenced by many bindings simultaneously.

    </li></ul>

    <p>

    The concrete asset implementation is responsible for creating and

    managing the underlying <code>IContext</code> instance; this base type only

    exposes metadata about the context type.

    </p>
  example: []
  syntax:
    content: 'public abstract class SharedContextAsset : ContextAsset'
    content.vb: Public MustInherit Class SharedContextAsset Inherits ContextAsset
