  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Resolves a type from an assembly-qualified type name.
  remarks: >-
    <p>

    The method first calls <xref href="System.Type.GetType(System.String%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> with

    <code>throwOnError = false</code>. If that returns <code>null</code>, it scans

    all assemblies in <xref href="System.AppDomain.CurrentDomain" data-throw-if-not-resolved="false"></xref> and returns

    the first type that matches <code class="paramref">typeName</code>.

    </p>
  example: []
  syntax:
    content: public static Type? Resolve(string typeName)
    parameters:
    - id: typeName
      type: System.String
      description: The assembly-qualified type name to resolve.
    return:
      type: System.Type
      description: The resolved <xref href="System.Type" data-throw-if-not-resolved="false"></xref> if found; otherwise <code>null</code>.
    content.vb: Public Shared Function Resolve(typeName As String) As Type
