- uid: ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.ApplyTo(ZenECS.Core.IWorld,ZenECS.Core.Entity,ZenECS.Core.ICommandBuffer)
  commentId: M:ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.ApplyTo(ZenECS.Core.IWorld,ZenECS.Core.Entity,ZenECS.Core.ICommandBuffer)
  id: ApplyTo(ZenECS.Core.IWorld,ZenECS.Core.Entity,ZenECS.Core.ICommandBuffer)
  parent: ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData
  langs:
  - csharp
  - vb
  name: ApplyTo(IWorld, Entity, ICommandBuffer)
  nameWithType: EntityBlueprintData.ApplyTo(IWorld, Entity, ICommandBuffer)
  fullName: ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.ApplyTo(ZenECS.Core.IWorld, ZenECS.Core.Entity, ZenECS.Core.ICommandBuffer)
  type: Method
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/Blueprints/EntityBlueprintData.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: ApplyTo
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Blueprints/EntityBlueprintData.cs
    startLine: 104
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Applies all stored component snapshots to an entity.
  remarks: >-
    <p>

    For each <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.Entry" data-throw-if-not-resolved="false"></xref> in <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.entries" data-throw-if-not-resolved="false"></xref>:

    </p>

    <ol><li>

    Resolve the component type via <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.Resolve(System.String)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    Deserialize the JSON snapshot using

    <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintComponentJson.Deserialize(System.String%2cSystem.Type)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    Add the boxed component to the entity via

    <xref href="ZenECS.Core.ICommandBuffer.AddComponentBoxed(ZenECS.Core.Entity%2cSystem.Object)" data-throw-if-not-resolved="false"></xref>.

    </li></ol>

    <p>

    Entries with invalid <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.Entry.typeName" data-throw-if-not-resolved="false"></xref> or unresolved

    types are skipped.

    </p>
  example: []
  syntax:
    content: public void ApplyTo(IWorld world, Entity e, ICommandBuffer cmd)
    parameters:
    - id: world
      type: ZenECS.Core.IWorld
      description: Target <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> that owns <code class="paramref">e</code>.
    - id: e
      type: ZenECS.Core.Entity
      description: The entity to which components should be added.
    - id: cmd
      type: ZenECS.Core.ICommandBuffer
      description: Command buffer used to add components in a write-safe manner.
    content.vb: Public Sub ApplyTo(world As IWorld, e As Entity, cmd As ICommandBuffer)
  overload: ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.ApplyTo*
