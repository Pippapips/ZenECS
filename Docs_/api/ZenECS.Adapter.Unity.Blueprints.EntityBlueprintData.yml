  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Blueprints
  summary: Runtime blueprint data container for component snapshots.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData" data-throw-if-not-resolved="false"></xref> is a pure data object that can be

    serialized and used both inside and outside Unity ScriptableObjects.

    It represents a list of component snapshots that can be applied to an

    entity in a given <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Each snapshot entry stores:

    </p>

    <ul><li>

    <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.Entry.typeName" data-throw-if-not-resolved="false"></xref>: the assembly-qualified component type name.

    </li><li>

    <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintData.Entry.json" data-throw-if-not-resolved="false"></xref>: JSON encoded by

    <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprintComponentJson.Serialize(System.Object%2cSystem.Type)" data-throw-if-not-resolved="false"></xref>.

    </li></ul>
  example: []
  syntax:
    content: >-
      [Serializable]

      public sealed class EntityBlueprintData
    content.vb: >-
      <Serializable>

      Public NotInheritable Class EntityBlueprintData
