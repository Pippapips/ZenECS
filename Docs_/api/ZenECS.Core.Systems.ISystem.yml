  summary: Executes the system logic against the given world.
  example: []
  syntax:
    content: void Run(IWorld w, float dt)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: The ECS world instance.
    - id: dt
      type: System.Single
      description: >-
        Time delta in seconds.

        For fixed-step systems this equals the fixed timestep;

        for frame systems it is the frame delta;

        some setup systems may ignore this value.
    content.vb: Sub Run(w As IWorld, dt As Single)
