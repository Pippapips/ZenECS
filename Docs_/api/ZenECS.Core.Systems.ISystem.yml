  namespace: ZenECS.Core.Systems
  summary: Base interface for all ECS systems.
  remarks: >-
    <p>

    Specialized interfaces such as <code>IFixedRunSystem</code>,

    <code>IFrameRunSystem</code>, or <code>IFrameLateSystem</code> refine when and how

    <xref href="ZenECS.Core.Systems.ISystem.Run(ZenECS.Core.IWorld%2cSystem.Single)" data-throw-if-not-resolved="false"></xref> is invoked (for example fixed vs variable timestep,

    early vs late frame).

    </p>

    <p>

    Deterministic ordering between systems is handled externally by the

    system planner/runner and is typically based on <xref href="ZenECS.Core.Systems.SystemGroup" data-throw-if-not-resolved="false"></xref>

    plus an explicit ordering key.

    </p>
  example: []
  syntax:
    content: public interface ISystem
    content.vb: Public Interface ISystem
