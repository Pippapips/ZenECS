  name: TryGetCurrent(out IKernel?)
  nameWithType: KernelLocator.TryGetCurrent(out IKernel?)
  fullName: ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent(out ZenECS.Core.IKernel?)
  type: Method
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/Kernel/KernelLocator.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS_deprecated.git
    id: TryGetCurrent
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Kernel/KernelLocator.cs
    startLine: 91
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Attempts to get the current active ZenECS kernel without throwing an exception.
  remarks: >-
    <p>

    Resolution order:

    </p>

    <ol><li>

    Cached kernel stored in this locator.

    </li><li>

    <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.Kernel" data-throw-if-not-resolved="false"></xref>, if assigned.

    </li><li>

    <xref href="ZenECS.Adapter.Unity.EcsDriver" data-throw-if-not-resolved="false"></xref> in the scene (first found). If the driver

    exists but its <xref href="ZenECS.Adapter.Unity.EcsDriver.Kernel" data-throw-if-not-resolved="false"></xref> is <code>null</code>, the

    kernel is automatically created via EcsDriver.CreateKernel().

    </li><li>

    Automatic creation of an <xref href="ZenECS.Adapter.Unity.EcsDriver" data-throw-if-not-resolved="false"></xref> via

    <xref href="ZenECS.Adapter.Unity.KernelLocator.CreateEcsDriverWithKernel(ZenECS.Core.KernelOptions%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>, which also creates a

    kernel instance.

    </li></ol>
  example: []
  syntax:
    content: public static bool TryGetCurrent(out IKernel? kernel)
    parameters:
    - id: kernel
      type: ZenECS.Core.IKernel
      description: >-
        When this method returns, contains the resolved kernel if found or created;

        otherwise <code>null</code>.
    return:
      type: System.Boolean
      description: <code>true</code> if a kernel was successfully obtained or created; otherwise <code>false</code>.
    content.vb: Public Shared Function TryGetCurrent(kernel As IKernel) As Boolean
  overload: ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent*
  nameWithType.vb: KernelLocator.TryGetCurrent(IKernel)
  fullName.vb: ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent(ZenECS.Core.IKernel)
  name.vb: TryGetCurrent(IKernel)
