- uid: ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent(ZenECS.Core.IKernel@)
  commentId: M:ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent(ZenECS.Core.IKernel@)
