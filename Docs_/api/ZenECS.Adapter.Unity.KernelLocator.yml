  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Global-access gateway for <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref> and multi-world helpers.
  remarks: >-
    <p>

    Kernel resolution priority:

    </p>

    <ol><li>

    If <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.Kernel" data-throw-if-not-resolved="false"></xref> is already set, it is used.

    </li><li>

    Otherwise, search the scene for an <xref href="ZenECS.Adapter.Unity.EcsDriver" data-throw-if-not-resolved="false"></xref> and use its

    <xref href="ZenECS.Adapter.Unity.EcsDriver.Kernel" data-throw-if-not-resolved="false"></xref> if available.

    </li><li>

    If neither exists, automatically create a new <xref href="ZenECS.Adapter.Unity.EcsDriver" data-throw-if-not-resolved="false"></xref>

    GameObject (optionally marked GameObject.DontDestroyOnLoad)

    and create a kernel from it.

    </li></ol>

    <p>

    The class also provides helpers for discovering and creating worlds by

    name or tags, as well as snapshot-style dictionary views of all worlds.

    </p>
  example: []
  syntax:
    content: public static class KernelLocator
    content.vb: Public Module KernelLocator
