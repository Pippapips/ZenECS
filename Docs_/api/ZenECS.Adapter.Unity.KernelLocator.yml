  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Gets the current active ZenECS kernel.
  remarks: >-
    <p>

    This property uses <xref href="ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent(ZenECS.Core.IKernel%40)" data-throw-if-not-resolved="false"></xref> internally.

    If no kernel can be obtained or created, an <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref>

    is thrown. For safe access without exceptions, use <xref href="ZenECS.Adapter.Unity.KernelLocator.TryGetCurrent(ZenECS.Core.IKernel%40)" data-throw-if-not-resolved="false"></xref>

    instead.

    </p>
