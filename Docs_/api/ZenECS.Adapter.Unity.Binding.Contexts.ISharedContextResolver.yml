    id: ISharedContextResolver
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Binding/Contexts/ISharedContextResolver.cs
    startLine: 43
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Binding.Contexts
  summary: Resolves shared <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instances from marker assets or type.
  remarks: >-
    <p>

    This abstraction allows binding code to obtain shared/global context

    instances without knowing how they are created or stored. A concrete

    implementation may:

    </p>

    <ul><li>

    Use a dependency injection container (for example, Zenject) to resolve

    <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instances.

    </li><li>

    Maintain an internal dictionary that maps context types to instances.

    </li></ul>

    <p>

    The interface does not define any lifetime policy; it is up to the

    implementation and surrounding application code to decide when

    contexts are created and disposed.

    </p>
  example: []
  syntax:
    content: public interface ISharedContextResolver
    content.vb: Public Interface ISharedContextResolver
