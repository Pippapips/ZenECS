  namespace: ZenECS.Adapter.Unity.Binding.Contexts
  summary: Resolves a shared context from a marker asset.
  example: []
  syntax:
    content: IContext? Resolve(SharedContextAsset marker)
    parameters:
    - id: marker
      type: ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset
      description: >-
        The <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset" data-throw-if-not-resolved="false"></xref> that describes the shared

        context to resolve. Implementations typically use

        <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset.ContextType" data-throw-if-not-resolved="false"></xref> to identify the

        concrete <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> type.
    return:
      type: ZenECS.Core.Binding.IContext
      description: >-
        The resolved <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instance, or <code>null</code> if

        the marker is <code>null</code> or no matching context is available.
    content.vb: Function Resolve(marker As SharedContextAsset) As IContext
