  namespace: ZenECS.Adapter.Unity.Binding.Contexts
  summary: Adds a context instance to the resolver.
  remarks: >-
    <p>

    In implementations backed by a DI container, this method may be a

    no-op because the container is responsible for managing instances.

    In dictionary-based implementations it typically registers or

    replaces the context under its runtime type.

    </p>
  example: []
  syntax:
    content: void AddContext(IContext? context)
    parameters:
    - id: context
      type: ZenECS.Core.Binding.IContext
      description: >-
        The context instance to register. If <code>null</code>, the call is

        ignored.
    content.vb: Sub AddContext(context As IContext)
