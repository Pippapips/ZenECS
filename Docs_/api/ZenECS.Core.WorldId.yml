  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: >-
    Stable, value-type identifier for a <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref>.

    Wraps a <xref href="System.Guid" data-throw-if-not-resolved="false"></xref> to provide strong typing, readable intent,

    and well-defined equality semantics across application domains.
  remarks: >-
    <p>

    <b>Why a wrapper around <xref href="System.Guid" data-throw-if-not-resolved="false"></xref>?</b>

    A dedicated type prevents accidental misuse of arbitrary GUIDs where a

    world identity is required, and allows documenting/expanding semantics

    without leaking implementation details to callers.

    </p>

    <p>

    <b>Equality &amp; hashing</b> are based solely on the underlying

    <xref href="System.Guid" data-throw-if-not-resolved="false"></xref> value, making this struct safe to use as a dictionary

    key or in sets.

    </p>
  example: []
  syntax:
    content: 'public readonly struct WorldId : IEquatable<WorldId>'
    content.vb: Public Structure WorldId Implements IEquatable(Of WorldId)
