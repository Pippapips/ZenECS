    id: DestroyEntityLink
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Linking/EntityLink.cs
    startLine: 167
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: >-
    Destroys the <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref> attached to the GameObject,

    if any, and detaches it from the world registry.
  remarks: >-
    <p>

    In the Unity Editor, this method looks up any existing

    <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref> on <code class="paramref">go</code>, calls

    <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.Detach" data-throw-if-not-resolved="false"></xref>, and leaves destruction to Unity's

    usual component lifecycle.

    </p>

    <p>

    In non-editor builds, this method is compiled out and does nothing.

    </p>
  example: []
  syntax:
    content: public static void DestroyEntityLink(this GameObject go)
    parameters:
    - id: go
      type: UnityEngine.GameObject
      description: The GameObject whose link should be destroyed.
    content.vb: Public Shared Sub DestroyEntityLink(go As GameObject)
  overload: ZenECS.Adapter.Unity.Linking.EntityLinkExtensions.DestroyEntityLink*
