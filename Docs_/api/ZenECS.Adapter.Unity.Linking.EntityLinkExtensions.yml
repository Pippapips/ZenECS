  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: >-
    Ensures a link exists on the GameObject and attaches it to the

    specified world and entity.
  remarks: >-
    <p>

    In the Unity Editor, this method either reuses an existing

    <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref> or adds a new one to <code class="paramref">go</code>,

    then calls <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.Attach(ZenECS.Core.IWorld%2cZenECS.Core.Entity%40)" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    In non-editor builds, this method is compiled out and always

    returns <code>null</code>.

    </p>
  example: []
  syntax:
    content: public static EntityLink? CreateEntityLink(this GameObject go, IWorld w, in Entity e)
    parameters:
    - id: go
      type: UnityEngine.GameObject
      description: The target GameObject to attach the link to.
    - id: w
      type: ZenECS.Core.IWorld
      description: The world that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: The entity to link.
    return:
      type: ZenECS.Adapter.Unity.Linking.EntityLink
      description: >-
        The created or existing <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref> instance in the

        Unity Editor; otherwise <code>null</code> in non-editor builds.
    content.vb: Public Shared Function CreateEntityLink(go As GameObject, w As IWorld, e As Entity) As EntityLink
  overload: ZenECS.Adapter.Unity.Linking.EntityLinkExtensions.CreateEntityLink*
  nameWithType.vb: EntityLinkExtensions.CreateEntityLink(GameObject, IWorld, Entity)
