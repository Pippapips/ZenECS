  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Installer-local system types to be added to the world.
  remarks: >-
    <p>

    This array is merged with all types provided by

    <xref href="ZenECS.Adapter.Unity.WorldSystemCreator.systemPresets" data-throw-if-not-resolved="false"></xref> at runtime. The combined set is

    deduplicated before instantiation.

    </p>

    <p>

    Only non-abstract types assignable to <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> are

    considered valid.

    </p>
  example: []
  syntax:
    content: >-
      [Header("Systems")]

      [Tooltip("ISystem implementation types (installer-local). Merged with all presets at runtime.")]

      [SystemTypeFilter(typeof(ISystem), false)]

      public SystemTypeRef[]? systemTypes
    return:
