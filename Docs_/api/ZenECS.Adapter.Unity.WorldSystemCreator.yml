  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: System preset assets to merge into this world.
  remarks: >-
    <p>

    Each <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset" data-throw-if-not-resolved="false"></xref> contributes a set of valid

    <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> types (via

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset.GetValidTypes" data-throw-if-not-resolved="false"></xref>). All types from all

    presets are merged with <xref href="ZenECS.Adapter.Unity.WorldSystemCreator.systemTypes" data-throw-if-not-resolved="false"></xref> to form the final

    registration list.

    </p>
  example: []
  syntax:
    content: >-
      [Tooltip("System preset assets to merge into this world. All types from all presets are combined.")]

      public SystemsPreset[]? systemPresets
    return:
      type: ZenECS.Adapter.Unity.SystemPresets.SystemsPreset[]
    content.vb: >-
      <Tooltip("System preset assets to merge into this world. All types from all presets are combined.")>

      Public systemPresets As SystemsPreset()
