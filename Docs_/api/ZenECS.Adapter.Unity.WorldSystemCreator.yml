  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Ensures a world exists, tags it, and registers systems for it.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.WorldSystemCreator" data-throw-if-not-resolved="false"></xref> is a scene-level bootstrap that:

    </p>

    <ol><li>

    Ensures a world instance exists via

    <xref href="ZenECS.Adapter.Unity.KernelLocator.EnsureWorld(System.String%2cSystem.Collections.Generic.IEnumerable%7bSystem.String%7d%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    Merges system types from <xref href="ZenECS.Adapter.Unity.WorldSystemCreator.systemPresets" data-throw-if-not-resolved="false"></xref> and

    <xref href="ZenECS.Adapter.Unity.WorldSystemCreator.systemTypes" data-throw-if-not-resolved="false"></xref>, deduplicating by concrete type.

    </li><li>

    Instantiates the systems (via DI or <xref href="System.Activator" data-throw-if-not-resolved="false"></xref>) and

    registers them into the world using IWorld.AddSystems.

    </li></ol>

    <p>

    When the <code>ZENECS_ZENJECT</code> scripting define is set, the installer

    inherits from MonoInstaller and can resolve systems via

    an <xref href="ZenECS.Adapter.Unity.SystemPresets.ISystemPresetResolver" data-throw-if-not-resolved="false"></xref> (typically bound in

    ProjectInstaller). Without Zenject, it falls back to

    a lightweight <xref href="UnityEngine.MonoBehaviour" data-throw-if-not-resolved="false"></xref> that uses

    <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref> for system construction.

    </p>
  example: []
  syntax:
    content: 'public sealed class WorldSystemCreator : MonoBehaviour'
    content.vb: Public NotInheritable Class WorldSystemCreator Inherits MonoBehaviour
