    startLine: 67
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Global bridge between ZenECS core and Unity-specific infrastructure.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge" data-throw-if-not-resolved="false"></xref> is a lightweight static hub that allows

    Unity runtime code, editor tools, and installers to coordinate around

    a few shared ZenECS services:

    </p>

    <ul><li>

    <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.Kernel" data-throw-if-not-resolved="false"></xref> — the primary <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref> instance used

    by the application.

    </li><li>

    <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.SystemPresetResolver" data-throw-if-not-resolved="false"></xref> — used to instantiate

    <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> implementations from presets or type lists.

    </li><li>

    <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.SharedContextResolver" data-throw-if-not-resolved="false"></xref> — used to resolve shared

    <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset" data-throw-if-not-resolved="false"></xref> markers to

    concrete <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instances.

    </li></ul>

    <p>

    The bridge intentionally contains no direct references to

    <code>UnityEditor</code> so that it is safe to use in player builds as well

    as editor-only tooling.

    </p>

    <p>

    Typical initialization flows:

    </p>

    <ol><li>

    <b>With Zenject</b> — <code>ProjectInstaller</code> (Zenject installer)

    creates the kernel and binds resolvers, then assigns them to the

    bridge.

    </li><li>

    <b>Without Zenject</b> — a lightweight <code>ProjectInstaller</code>

    <code>MonoBehaviour</code> or another bootstrap script assigns the kernel

    and resolver implementations directly.

    </li></ol>
  example: []
