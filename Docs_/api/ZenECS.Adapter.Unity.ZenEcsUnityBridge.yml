  summary: Gets or sets the resolver used to create <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances.
  remarks: >-
    <p>

    This resolver is typically used by <code>WorldSystemInstaller</code> to

    instantiate systems from a merged list of types and

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemsPreset" data-throw-if-not-resolved="false"></xref> assets. When <code>null</code>, callers

    should fall back to directly constructing systems (for example via

    <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref>).

    </p>
