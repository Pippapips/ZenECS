      repo: https://github.com/Pippapips/ZenECS.git
    id: SharedContextResolver
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Shared/ZenEcsUnityBridge.cs
    startLine: 99
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Gets or sets the shared context resolver used by binding and blueprints.
  remarks: >-
    <p>

    This resolver is used when applying

    <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.SharedContextAsset" data-throw-if-not-resolved="false"></xref> markers,

    for example from <xref href="ZenECS.Adapter.Unity.Blueprints.EntityBlueprint" data-throw-if-not-resolved="false"></xref> during

    entity spawn. It maps marker assets or context types to concrete

    <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instances that are then registered with worlds.

    </p>

    <p>

    When this property is <code>null</code>, shared-context resolution is

    simply skipped, and only per-entity contexts are created.

    </p>
  example: []
  syntax:
    content: public static ISharedContextResolver? SharedContextResolver { get; set; }
    parameters: []
    return:
      type: ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver
    content.vb: Public Shared Property SharedContextResolver As ISharedContextResolver
  overload: ZenECS.Adapter.Unity.ZenEcsUnityBridge.SharedContextResolver*
