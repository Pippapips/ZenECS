      repo: https://github.com/Pippapips/ZenECS.git
    id: Kernel
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Shared/ZenEcsUnityBridge.cs
    startLine: 125
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity
  summary: Gets or sets the optional global ZenECS kernel reference.
  remarks: >-
    <p>

    This property is usually initialized in a bootstrap path such as

    <code>ProjectInstaller</code> or an editor bootstrap script, and can then

    be consumed by runtime code or tools that do not have direct access

    to the DI container or scene-level <code>EcsDriver</code>.

    </p>

    <p>

    When <code>null</code>, callers should either:

    </p>

    <ul><li>

    Use <xref href="ZenECS.Adapter.Unity.KernelLocator.Current" data-throw-if-not-resolved="false"></xref> to lazily create or locate

    a kernel.

    </li><li>

    Or treat the absence of a kernel as a "not yet initialized" state

    and defer their logic.

    </li></ul>
  example: []
  syntax:
    content: public static IKernel? Kernel { get; set; }
    parameters: []
    return:
      type: ZenECS.Core.IKernel
    content.vb: Public Shared Property Kernel As IKernel
  overload: ZenECS.Adapter.Unity.ZenEcsUnityBridge.Kernel*
