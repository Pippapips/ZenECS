  namespace: ZenECS.Adapter.Unity.Binding.Contexts
  summary: Initializes a new resolver in manual mode (non-Zenject).
  remarks: >-
    <p>

    In this configuration, contexts are stored in an internal dictionary

    and must be registered via <xref href="ZenECS.Adapter.Unity.Binding.Contexts.SharedContextResolver.AddContext(ZenECS.Core.Binding.IContext)" data-throw-if-not-resolved="false"></xref> before they can

    be resolved.

    </p>
