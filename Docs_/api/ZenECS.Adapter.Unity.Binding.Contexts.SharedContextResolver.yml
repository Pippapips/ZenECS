  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Binding.Contexts
  summary: Default implementation of <xref href="ZenECS.Adapter.Unity.Binding.Contexts.ISharedContextResolver" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    This resolver supports two operation modes, selected at compile time by

    the <code>ZENECS_ZENJECT</code> scripting define symbol:

    </p>

    <ul><li>

    <b>Zenject mode</b> (<code>ZENECS_ZENJECT</code> defined): contexts are

    resolved from a DiContainer; lifecycle is entirely

    managed by Zenject. <xref href="ZenECS.Adapter.Unity.Binding.Contexts.SharedContextResolver.AddContext(ZenECS.Core.Binding.IContext)" data-throw-if-not-resolved="false"></xref>,

    <xref href="ZenECS.Adapter.Unity.Binding.Contexts.SharedContextResolver.RemoveContext(ZenECS.Core.Binding.IContext)" data-throw-if-not-resolved="false"></xref>, and <xref href="ZenECS.Adapter.Unity.Binding.Contexts.SharedContextResolver.RemoveAllContexts" data-throw-if-not-resolved="false"></xref> are

    implemented as no-ops.

    </li><li>

    <b>Manual mode</b> (<code>ZENECS_ZENJECT</code> not defined): contexts are

    stored in an internal <xref href="System.Collections.Generic.Dictionary%602" data-throw-if-not-resolved="false"></xref> keyed by

    their runtime <xref href="System.Type" data-throw-if-not-resolved="false"></xref>. The resolver provides both

    lookup and registration/removal operations.

    </li></ul>
  example: []
  syntax:
    content: 'public sealed class SharedContextResolver : ISharedContextResolver'
    content.vb: Public NotInheritable Class SharedContextResolver Implements ISharedContextResolver
