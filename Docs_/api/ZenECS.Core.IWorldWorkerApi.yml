  summary: Executes all jobs currently scheduled for this world.
  remarks: >-
    <p>

    Callers are free to choose when to run scheduled jobs. A common pattern

    is to invoke this at explicit simulation barriers (for example, after

    all systems in a phase have run).

    </p>
  example: []
  syntax:
    content: int RunScheduledJobs()
    return:
      type: System.Int32
      description: The number of jobs executed during this call.
