  summary: Marker interface for components that must exist zero-or-one times per world.
  remarks: >-
    <p>

    Components that implement this interface are treated as world-level singletons:

    any given world may have at most one entity that carries a component of that

    type. The world implementation is responsible for enforcing this invariant.

    </p>

    <p>

    Typical usage:

    </p>

    <ul><li>Global configuration for a world (for example, gravity).</li><li>World-level runtime state (for example, match timer).</li><li>Shared references such as global spawners or managers.</li></ul>
