  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Systems
  summary: Resolves the execution <xref href="ZenECS.Core.Systems.SystemGroup" data-throw-if-not-resolved="false"></xref> for a system type.
  remarks: >-
    <p>

    Current behavior is attribute-only. If you want additional inference

    (for example, based on marker interfaces such as <code>IFixedRunSystem</code>

    or <code>IFrameRunSystem</code>), this is the place to extend.

    </p>
  example: []
  syntax:
    content: public static SystemGroup ResolveGroup(Type t)
    parameters:
    - id: t
      type: System.Type
      description: System type to inspect.
    return:
      type: ZenECS.Core.Systems.SystemGroup
      description: >-
        The resolved <xref href="ZenECS.Core.Systems.SystemGroup" data-throw-if-not-resolved="false"></xref> if an explicit

        <xref href="ZenECS.Core.Systems.GroupAttribute" data-throw-if-not-resolved="false"></xref> (or one of its concrete subclasses such as

        <xref href="ZenECS.Core.Systems.FixedInputGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FixedDecisionGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FixedGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FixedPostGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FrameInputGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FrameSyncGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FrameViewGroupAttribute" data-throw-if-not-resolved="false"></xref>,

        <xref href="ZenECS.Core.Systems.FrameUIGroupAttribute" data-throw-if-not-resolved="false"></xref>) is present on the type;

        otherwise <xref href="ZenECS.Core.Systems.SystemGroup.Unknown" data-throw-if-not-resolved="false"></xref>.
    content.vb: Public Shared Function ResolveGroup(t As Type) As SystemGroup
  overload: ZenECS.Core.Systems.SystemUtil.ResolveGroup*
