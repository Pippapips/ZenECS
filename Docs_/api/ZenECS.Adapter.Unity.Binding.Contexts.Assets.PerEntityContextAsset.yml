  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Binding.Contexts.Assets
  summary: Base asset for per-entity contexts (entity-owned resources).
  remarks: >-
    <p>

    A <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.PerEntityContextAsset" data-throw-if-not-resolved="false"></xref> acts as a factory for creating a

    new <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instance per entity. It is commonly used to

    construct view-models, presenters, or other entity-local services that

    participate in ZenECS binding.

    </p>

    <p>

    The typical lifecycle is:

    </p>

    <ol><li>

    The asset is referenced by some binding configuration or blueprint.

    </li><li>

    When an entity is created, the asset's <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.PerEntityContextAsset.Create" data-throw-if-not-resolved="false"></xref> method is

    called to allocate the concrete context instance.

    </li><li>

    The caller registers the returned context with the entity or world and

    manages its disposal when the entity is destroyed.

    </li></ol>
  example: []
  syntax:
    content: 'public abstract class PerEntityContextAsset : ContextAsset'
    content.vb: Public MustInherit Class PerEntityContextAsset Inherits ContextAsset
  inheritance:
