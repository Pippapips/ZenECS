  namespace: ZenECS.Adapter.Unity.Binding.Contexts.Assets
  summary: >-
    Gets the concrete <xref href="System.Type" data-throw-if-not-resolved="false"></xref> of the context instances

    produced by this asset.
  remarks: >-
    <p>

    Implementations should return the runtime type of the

    <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> created in <xref href="ZenECS.Adapter.Unity.Binding.Contexts.Assets.PerEntityContextAsset.Create" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    This metadata is used by tooling or binding code that needs to

    introspect the context type without instantiating it.

    </p>
  example: []
  syntax:
    content: public abstract Type ContextType { get; }
    parameters: []
    return:
      type: System.Type
    content.vb: Public MustOverride ReadOnly Property ContextType As Type
