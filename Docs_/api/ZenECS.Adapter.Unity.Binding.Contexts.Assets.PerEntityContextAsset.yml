    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/Binding/Contexts/Assets/PerEntity/PerEntityContextAsset.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: Create
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Binding/Contexts/Assets/PerEntity/PerEntityContextAsset.cs
    startLine: 82
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Binding.Contexts.Assets
  summary: Creates a new context instance for an entity.
  remarks: >-
    <p>

    This method does not automatically attach the context to any entity

    or world. The caller is responsible for:

    </p>

    <ul><li>Associating the context with the target entity.</li><li>Registering it with any relevant binders or systems.</li><li>Disposing it when the owning entity is destroyed.</li></ul>
  example: []
  syntax:
    content: public abstract IContext Create()
    return:
      type: ZenECS.Core.Binding.IContext
      description: >-
        A newly created <xref href="ZenECS.Core.Binding.IContext" data-throw-if-not-resolved="false"></xref> instance that is intended to

        be owned by a single entity.
    content.vb: Public MustOverride Function Create() As IContext
  overload: ZenECS.Adapter.Unity.Binding.Contexts.Assets.PerEntityContextAsset.Create*
