  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Convenience base class implementing the common binder lifecycle pattern.

    Derive from this for typical binders that:

    <ul><li>Cache <xref href="ZenECS.Core.Binding.BaseBinder.World" data-throw-if-not-resolved="false"></xref> and <xref href="ZenECS.Core.Binding.BaseBinder.Contexts" data-throw-if-not-resolved="false"></xref> on bind.</li><li>React to context attach/detach notifications.</li><li>Perform updates in <xref href="ZenECS.Core.Binding.BaseBinder.OnApply(ZenECS.Core.IWorld%2cZenECS.Core.Entity)" data-throw-if-not-resolved="false"></xref>.</li></ul>
  example: []
  syntax:
