  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: Default implementation of <xref href="ZenECS.Adapter.Unity.SystemPresets.ISystemPresetResolver" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemPresetResolver" data-throw-if-not-resolved="false"></xref> turns a list of <xref href="System.Type" data-throw-if-not-resolved="false"></xref>

    descriptors into live <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances, while avoiding

    duplicate system registrations on the current world.

    </p>

    <p>

    The behavior depends on the <code>ZENECS_ZENJECT</code> scripting define:

    </p>

    <ul><li>

    <b>Zenject mode</b> (<code>ZENECS_ZENJECT</code> defined): systems are

    instantiated via Zenject DiContainer.Instantiate.

    </li><li>

    <b>Non-Zenject mode</b>: systems are instantiated via

    <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref>.

    </li></ul>

    <p>

    In both modes, if <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.Kernel" data-throw-if-not-resolved="false"></xref> has a

    non-null CurrentWorld property, the resolver checks

    <xref href="ZenECS.Core.IWorldSystemsApi.TryGetSystem(System.Type%2cZenECS.Core.Systems.ISystem%40)" data-throw-if-not-resolved="false"></xref> and skips any type

    for which a system already exists.

    </p>
  example: []
  syntax:
    content: 'public sealed class SystemPresetResolver : ISystemPresetResolver'
    content.vb: Public NotInheritable Class SystemPresetResolver Implements ISystemPresetResolver
