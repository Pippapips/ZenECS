  fullName: ZenECS.Adapter.Unity.SystemPresets.SystemPresetResolver.InstantiateSystems(System.Collections.Generic.List<System.Type>)
  type: Method
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/SystemPresetResolver.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: InstantiateSystems
    path: ../Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/SystemPresetResolver.cs
    startLine: 128
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: >-
    Instantiates systems for the given types, skipping ones that are

    already registered on the current world.
  remarks: >-
    <p>

    For each type <code>T</code> in <code class="paramref">types</code>:

    </p>

    <ol><li>

    If <xref href="ZenECS.Adapter.Unity.ZenEcsUnityBridge.Kernel" data-throw-if-not-resolved="false"></xref> and its

    CurrentWorld property are non-null, call

    <xref href="ZenECS.Core.IWorldSystemsApi.TryGetSystem(System.Type%2cZenECS.Core.Systems.ISystem%40)" data-throw-if-not-resolved="false"></xref>; if a system

    is already registered for <code>T</code>, it is skipped.

    </li><li>

    Otherwise, a new instance is created using either Zenject

    (DiContainer.Instantiate) or

    <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    If instantiation fails, a warning is logged to the Unity console

    and the type is ignored.

    </li></ol>
  example: []
  syntax:
    content: public List<ISystem> InstantiateSystems(List<Type> types)
    parameters:
    - id: types
      type: System.Collections.Generic.List{System.Type}
      description: >-
        List of candidate system types to instantiate. Types that are

        abstract, do not implement <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref>, or already have a

        registered instance in the current world are skipped.
    return:
      type: System.Collections.Generic.List{ZenECS.Core.Systems.ISystem}
      description: >-
        A list of newly created <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances. The list

        may be empty if no new systems are needed or all instantiations

        fail.
    content.vb: Public Function InstantiateSystems(types As List(Of Type)) As List(Of ISystem)
  overload: ZenECS.Adapter.Unity.SystemPresets.SystemPresetResolver.InstantiateSystems*
