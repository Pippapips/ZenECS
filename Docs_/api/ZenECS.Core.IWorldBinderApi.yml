  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Attaches a binder instance to an entity using the world's default attach policy.
  remarks: >-
    <p>

    Implementations are expected to:

    </p>

    <ul><li>

    Validate that required contexts are present and behave according to

    the world's configured attach policy.
      </li><li>
    Ensure the same binder instance is not attached multiple times.
      </li><li>
    Register the binder so it will be detached automatically if

    <code class="paramref">e</code> is despawned or the world is reset.
      </li></ul>
  example: []
  syntax:
    content: void AttachBinder(Entity e, IBinder? binder)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    - id: binder
      type: ZenECS.Core.Binding.IBinder
      description: Binder instance to attach. If <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a>, the call is ignored.
    content.vb: Sub AttachBinder(e As Entity, binder As IBinder)
  overload: ZenECS.Core.IWorldBinderApi.AttachBinder*
  nameWithType.vb: IWorldBinderApi.AttachBinder(Entity, IBinder)
  fullName.vb: ZenECS.Core.IWorldBinderApi.AttachBinder(ZenECS.Core.Entity, ZenECS.Core.Binding.IBinder)
  name.vb: AttachBinder(Entity, IBinder)
