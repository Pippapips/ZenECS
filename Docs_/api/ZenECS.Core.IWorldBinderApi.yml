  summary: Checks whether an entity currently has a binder of type <code class="typeparamref">T</code>.
  example: []
  syntax:
    content: 'bool HasBinder<T>(Entity e) where T : class, IBinder'
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    typeParameters:
    - id: T
      description: Binder type to query for.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if at least one binder of type

        <code class="typeparamref">T</code> is attached to <code class="paramref">e</code>;

        otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function HasBinder(Of T As {Class, IBinder})(e As Entity) As Boolean
