  namespace: ZenECS.Core
  summary: Raised immediately after an entity is created and has a valid handle.
  remarks: >-
    At this point, the entity exists in the world's bookkeeping, but it may not

    yet have any components. If you need to react to specific components being

    added, listen to your component/binder deltas instead.
  example: []
  syntax:
    content: public static event Action<IWorld, Entity>? EntityCreated
    return:
      type: System.Action{ZenECS.Core.IWorld,ZenECS.Core.Entity}
    content.vb: Public Shared Event EntityCreated As Action(Of IWorld, Entity)
