    startLine: 73
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Raised when a despawn has been requested for an entity.
  remarks: >-
    This is emitted <i>before</i> the world actually removes the entity. Use this

    to preemptively invalidate caches or stop external processes that reference

    the entity. The entity may still be considered alive until removal completes.
  example: []
  syntax:
    content: public static event Action<IWorld, Entity>? EntityDestroyRequested
    return:
      type: System.Action{ZenECS.Core.IWorld,ZenECS.Core.Entity}
    content.vb: Public Shared Event EntityDestroyRequested As Action(Of IWorld, Entity)
