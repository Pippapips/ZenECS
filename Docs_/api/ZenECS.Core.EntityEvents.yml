  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Global event hub for entity lifecycle notifications.
  remarks: >-
    <p>

    These events are raised by the world implementation to inform tools and

    observers about entity lifetime transitions. They are <b>not</b> intended to

    be used for gameplay logic; prefer systems and message buses for that.

    </p>

    <p>

    <b>Event order (when a full lifetime occurs):</b>

    </p>

    <ol><li>
          <xref href="ZenECS.Core.EntityEvents.EntityCreated" data-throw-if-not-resolved="false"></xref> — immediately after an entity is spawned.
        </li><li>
          <xref href="ZenECS.Core.EntityEvents.EntityDestroyRequested" data-throw-if-not-resolved="false"></xref> — when a despawn is requested.
        </li><li>
          <xref href="ZenECS.Core.EntityEvents.EntityDestroy" data-throw-if-not-resolved="false"></xref> — after the entity has been fully despawned and removed.
        </li></ol>
    <p>

    Handlers should be <i>exception-safe</i>. Exceptions thrown from subscribers

    will propagate to the caller that raised the event.

    </p>
  example: []
  syntax:
    content: public static class EntityEvents
    content.vb: Public Module EntityEvents
