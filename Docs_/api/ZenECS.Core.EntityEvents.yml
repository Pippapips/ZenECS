  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Raised after an entity has been fully removed from the world.
  remarks: >-
    At this point, the entity is no longer alive and its id may be recycled in

    the future. Do not attempt to access components from the supplied handle.
  example: []
  syntax:
    content: public static event Action<IWorld, Entity>? EntityDestroy
    return:
      type: System.Action{ZenECS.Core.IWorld,ZenECS.Core.Entity}
    content.vb: Public Shared Event EntityDestroy As Action(Of IWorld, Entity)
