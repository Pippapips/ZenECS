  namespace: ZenECS.Core
  summary: Builds a query over entities that have component <code class="typeparamref">T1</code>.
  example: []
  syntax:
    content: 'QueryEnumerable<T1> Query<T1>(Filter f = default) where T1 : struct'
    parameters:
    - id: f
      type: ZenECS.Core.Filter
      description: >-
        Optional composable filter. When left as <code>default</code>, only the

        presence of <code class="typeparamref">T1</code> is considered.
    typeParameters:
    - id: T1
      description: First required component type.
    return:
      type: ZenECS.Core.QueryEnumerable{{T1}}
      description: >-
        A value-type <xref href="ZenECS.Core.QueryEnumerable%601" data-throw-if-not-resolved="false"></xref> suitable for use in

        <code>foreach</code> loops without allocations.
    content.vb: Function Query(Of T1 As Structure)(f As Filter = Nothing) As QueryEnumerable(Of T1)
