    path: ../Packages/com.zenecs.core/Runtime/World/Api/IWorldQueryApi.cs
    startLine: 33
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: >-
    Read-only entity query surface that returns allocation-free value-type

    enumerables consumable directly in <code>foreach</code>.
  remarks: >-
    <p>

    Queries are strongly typed on the component tuple they require

    (<code class="typeparamref">T1</code> … <code class="typeparamref">T8</code>). Each

    <code>Query&lt;…&gt;(Filter)</code> call builds a <code>QueryEnumerable&lt;…&gt;</code>

    that can be iterated without allocating managed enumerators.

    </p>

    <p>

    The optional <xref href="ZenECS.Core.Filter" data-throw-if-not-resolved="false"></xref> parameter allows additional constraints

    to be expressed (for example, "with any of", "without all", etc.) beyond

    the base component set described by the generic parameters.

    </p>
  example: []
  syntax:
    content: public interface IWorldQueryApi
    content.vb: Public Interface IWorldQueryApi
