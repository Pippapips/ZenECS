  namespace: ZenECS.Core
  summary: Gets all contexts currently registered for an entity.
  example: []
  syntax:
    content: (Type type, object boxed)[] GetAllContexts(Entity e)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    return:
      type: System.ValueTuple{System.Type,System.Object}[]
      description: >-
        An array of tuples where <code>type</code> is the runtime type of the

        context and <code>boxed</code> is the context instance boxed as

        <xref href="System.Object" data-throw-if-not-resolved="false"></xref>. Returns an empty array if no contexts

        are registered.
    content.vb: Function GetAllContexts(e As Entity) As (type As Type, boxed As Object)()
