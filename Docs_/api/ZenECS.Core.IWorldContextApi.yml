  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Requests that a context be reinitialized for an entity.
  remarks: >-
    <p>

    The exact semantics of "reinitialize" are implementation-specific,

    but a common pattern is to re-run context setup logic after data

    changes, or after a binder has reattached to an existing view object.

    </p>
  example: []
  syntax:
    content: bool ReinitializeContext(Entity e, IContext ctx)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    - id: ctx
      type: ZenECS.Core.Binding.IContext
      description: >-
        Context instance to reinitialize (typically one that is already

        registered).
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the context is known and was successfully

        reinitialized; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function ReinitializeContext(e As Entity, ctx As IContext) As Boolean
  overload: ZenECS.Core.IWorldContextApi.ReinitializeContext*
