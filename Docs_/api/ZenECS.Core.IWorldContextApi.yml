  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Registers a context object for an entity.
  remarks: >-
    <p>

    The exact replacement policy (for example, whether multiple contexts

    of the same runtime type are allowed, or whether a new registration

    overwrites an existing one) is defined by the world implementation.

    </p>

    <p>

    Implementations are expected to detach or recycle contexts when

    entities are despawned or the world is reset.

    </p>
  example: []
  syntax:
    content: void RegisterContext(Entity e, IContext ctx)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    - id: ctx
      type: ZenECS.Core.Binding.IContext
      description: Context instance to associate with the entity.
    content.vb: Sub RegisterContext(e As Entity, ctx As IContext)
  overload: ZenECS.Core.IWorldContextApi.RegisterContext*
