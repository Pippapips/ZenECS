  namespace: ZenECS.Core
  summary: Removes a specific context instance from an entity.
  remarks: >-
    The call is a no-op if the context is not currently registered for

    <code class="paramref">e</code>.
  example: []
  syntax:
    content: bool RemoveContext(Entity e, IContext ctx)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    - id: ctx
      type: ZenECS.Core.Binding.IContext
      description: Context instance to remove.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the specified context instance was

        registered and removed; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function RemoveContext(e As Entity, ctx As IContext) As Boolean
