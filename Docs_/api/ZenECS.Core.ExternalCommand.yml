  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: >-
    Gets an optional callback that is invoked when a

    <xref href="ZenECS.Core.ExternalCommandKind.CreateEntity" data-throw-if-not-resolved="false"></xref> command is applied and the

    new entity handle is known.
  remarks: >-
    <p>

    The callback receives both the newly created <xref href="ZenECS.Core.ExternalCommand.Entity" data-throw-if-not-resolved="false"></xref> and

    the <xref href="ZenECS.Core.ICommandBuffer" data-throw-if-not-resolved="false"></xref> used to record the operation, allowing

    additional commands to be chained onto the same buffer.

    </p>
  example: []
