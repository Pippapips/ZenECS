  fullName: ZenECS.Adapter.Unity.SystemPresets.ISystemPresetResolver.InstantiateSystems(System.Collections.Generic.List<System.Type>)
  type: Method
  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/ISystemPresetResolver.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: InstantiateSystems
    path: ../Packages/com.zenecs.adapter.unity/Runtime/SystemPresets/ISystemPresetResolver.cs
    startLine: 83
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: >-
    Instantiates concrete <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances from the given

    list of system types.
  remarks: >-
    <p>

    This method acts as both a construction and a validation step:

    </p>

    <ul><li>

    Non-<xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> types should be ignored.

    </li><li>

    Abstract or open-generic types should not be instantiated.

    </li><li>

    Duplicate types may be filtered out according to the resolver's

    policy.

    </li></ul>
  example: []
  syntax:
    content: List<ISystem> InstantiateSystems(List<Type> types)
    parameters:
    - id: types
      type: System.Collections.Generic.List{System.Type}
      description: >-
        List of candidate types to instantiate. Implementations may assume

        that the caller attempted to filter out obvious invalid types, but

        should still perform validation as needed.
    return:
      type: System.Collections.Generic.List{ZenECS.Core.Systems.ISystem}
      description: >-
        A list of successfully created <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances.

        Implementations are free to drop types that are invalid, abstract,

        or already represented in the result.
    content.vb: Function InstantiateSystems(types As List(Of Type)) As List(Of ISystem)
