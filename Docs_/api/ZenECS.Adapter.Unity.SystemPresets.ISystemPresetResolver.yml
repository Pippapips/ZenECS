  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: Creates concrete <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances from a list of system types.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.SystemPresets.ISystemPresetResolver" data-throw-if-not-resolved="false"></xref> is a pluggable abstraction used by

    higher-level installers (for example, <code>WorldSystemInstaller</code>) to

    turn a set of <xref href="System.Type" data-throw-if-not-resolved="false"></xref> descriptors into live

    <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances.

    </p>

    <p>

    Typical implementations include:

    </p>

    <ul><li>

    A dependency injection container (such as Zenject) that resolves

    <xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> instances from bindings.

    </li><li>

    A simple factory that uses <xref href="System.Activator.CreateInstance(System.Type)" data-throw-if-not-resolved="false"></xref>

    to construct each system.

    </li></ul>

    <p>

    The interface defines a single method,

    <xref href="ZenECS.Adapter.Unity.SystemPresets.ISystemPresetResolver.InstantiateSystems(System.Collections.Generic.List%7bSystem.Type%7d)" data-throw-if-not-resolved="false"></xref>, which is responsible for validating

    the type list (for example, removing non-<xref href="ZenECS.Core.Systems.ISystem" data-throw-if-not-resolved="false"></xref> or

    abstract types) and constructing the final instance list.

    </p>
  example: []
  syntax:
    content: public interface ISystemPresetResolver
    content.vb: Public Interface ISystemPresetResolver
