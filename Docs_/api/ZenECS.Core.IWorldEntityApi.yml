  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Checks whether a handle refers to a live entity.
  remarks: >-
    <p>

    This method compares both the internal id and generation stored in

    <code class="paramref">e</code> against the world's entity table. If the slot

    has been reclaimed and its generation incremented, the handle is

    considered invalid and the method returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.

    </p>
  example: []
  syntax:
    content: bool IsAlive(Entity e)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Entity handle to validate.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the handle refers to an entity that is

        currently alive in this world; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function IsAlive(e As Entity) As Boolean
  overload: ZenECS.Core.IWorldEntityApi.IsAlive*
