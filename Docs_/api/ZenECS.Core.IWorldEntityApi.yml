  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Checks whether a raw (id, generation) pair refers to a live entity.
  remarks: >-
    <p>

    This overload is useful in low-level code paths where you already

    have separate id and generation values (for example, from serialized

    data or custom handles) and want to validate them without constructing

    an <xref href="ZenECS.Core.Entity" data-throw-if-not-resolved="false"></xref> wrapper.

    </p>
  example: []
  syntax:
    content: bool IsAlive(int id, int gen)
    parameters:
    - id: id
      type: System.Int32
      description: Internal entity id (index) to check.
    - id: gen
      type: System.Int32
      description: Expected generation for the id.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the pair refers to an entity that is

        currently alive in this world; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function IsAlive(id As Integer, gen As Integer) As Boolean
