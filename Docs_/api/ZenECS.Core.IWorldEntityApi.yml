  source:
    remote:
      path: Packages/com.zenecs.core/Runtime/World/Api/IWorldEntityApi.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: GetAllEntities
    path: ../Packages/com.zenecs.core/Runtime/World/Api/IWorldEntityApi.cs
    startLine: 109
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Gets a snapshot list of all currently alive entities.
  remarks: >-
    <p>

    The returned collection is a snapshot; subsequent spawns or despawns

    will not be reflected. Callers should not assume that entities remain

    alive for the duration of iteration and should still guard lookups

    with <xref href="ZenECS.Core.IWorldEntityApi.IsAlive(ZenECS.Core.Entity)" data-throw-if-not-resolved="false"></xref> if safety is required.

    </p>

    <p>

    This method is primarily intended for debugging, profiling, and

    editor tooling that needs a quick, enumerable view of world contents.

    </p>
  example: []
  syntax:
    content: IReadOnlyList<Entity> GetAllEntities()
    return:
      type: System.Collections.Generic.IReadOnlyList{ZenECS.Core.Entity}
      description: >-
        A read-only list containing all entities that are alive at the moment

        the snapshot is taken.
    content.vb: Function GetAllEntities() As IReadOnlyList(Of Entity)
  overload: ZenECS.Core.IWorldEntityApi.GetAllEntities*
