  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Pauses stepping for this world only.
  remarks: >-
    <p>

    When paused, core stepping callbacks (frame and fixed-step) should be

    skipped for this world even if the <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref> continues to tick.

    </p>

    <p>

    Pausing a world is idempotent; calling it multiple times has no extra effect.

    </p>
  example: []
  syntax:
    content: void Pause()
    content.vb: Sub Pause()
  overload: ZenECS.Core.IWorld.Pause*
