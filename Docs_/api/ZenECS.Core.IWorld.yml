  summary: Gets the stable identity of this world.
  remarks: >-
    <p>

    <xref href="ZenECS.Core.WorldId" data-throw-if-not-resolved="false"></xref> has value semantics and can safely be stored,

    logged, or transmitted. It does not change during the world's lifetime.

    </p>

