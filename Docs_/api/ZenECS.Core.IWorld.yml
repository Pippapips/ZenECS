  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Public façade for a single ECS world.
  remarks: >-
    <p>

    A world instance owns and coordinates all ECS concerns for a given

    simulation space: entity/component storage, querying, contexts, binders,

    messaging, hooks, snapshots, command buffers, and workers.

    </p>

    <p>

    The world is designed to be composable: it can exist alongside other

    worlds inside a single <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref> and can be paused, reset,

    or destroyed independently.

    </p>
  example: []
  syntax:
    content: 'public interface IWorld : IDisposable, IWorldQueryApi, IWorldQuerySpanApi, IWorldEntityApi, IWorldComponentApi, IWorldContextApi, IWorldBinderApi, IWorldSnapshotApi, IWorldMessagesApi, IWorldHookApi, IWorldCommandBufferApi, IWorldWorkerApi, IWorldSystemsApi'
