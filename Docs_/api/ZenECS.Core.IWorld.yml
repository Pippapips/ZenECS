    id: Reset
    path: ../Packages/com.zenecs.core/Runtime/World/Api/IWorld.cs
    startLine: 179
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Resets world storage and subsystems.
  remarks: >-
    <p>

    A reset clears entities, components, and subsystems, but the world

    object itself and its identity (<xref href="ZenECS.Core.IWorld.Id" data-throw-if-not-resolved="false"></xref>, <xref href="ZenECS.Core.IWorld.Name" data-throw-if-not-resolved="false"></xref>,

    <xref href="ZenECS.Core.IWorld.Tags" data-throw-if-not-resolved="false"></xref>) remain valid.

    </p>

    <p>

    Systems may receive reinitialization according to the world's

    implementation policy.

    </p>
  example: []
  syntax:
    content: void Reset(bool keepCapacity)
    parameters:
    - id: keepCapacity
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to retain internal array capacities for a faster

        reset (soft reset); <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to rebuild storage from the

        initial configuration (hard reset).
    content.vb: Sub Reset(keepCapacity As Boolean)
  overload: ZenECS.Core.IWorld.Reset*
  nameWithType.vb: IWorld.Reset(Boolean)
  fullName.vb: ZenECS.Core.IWorld.Reset(Boolean)
  name.vb: Reset(Boolean)
