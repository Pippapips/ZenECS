  namespace: ZenECS.Core
  summary: Gets the current generation value for an internal entity id.
  remarks: >-
    <p>

    Generations are used to validate <code>Entity</code> handles and detect

    stale references: an <code>Entity</code> is valid only if both its id and

    generation match the values stored in the world.

    </p>
  example: []
  syntax:
    content: int GenerationOf(int id)
    parameters:
    - id: id
      type: System.Int32
      description: Internal entity id (index) to query.
    return:
      type: System.Int32
      description: >-
        The generation associated with the specified id.

        Returns <code>0</code> or another sentinel for ids that are not in use.
