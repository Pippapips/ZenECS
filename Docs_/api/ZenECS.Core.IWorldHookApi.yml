  summary: Adds a write-permission predicate.
  remarks: >-
    <p>

    All registered predicates are evaluated when a write is attempted.

    Implementations typically combine them using logical AND

    (that is, all predicates must allow the write).

    </p>
  example: []
  syntax:
    content: void AddWritePermission(Func<Entity, Type, bool> hook)
    parameters:
    - id: hook
      type: System.Func{ZenECS.Core.Entity,System.Type,System.Boolean}
      description: >-
        Predicate that receives the target <xref href="ZenECS.Core.Entity" data-throw-if-not-resolved="false"></xref> and component

        <xref href="System.Type" data-throw-if-not-resolved="false"></xref> and returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the write

        is allowed, or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to deny it.
    content.vb: Sub AddWritePermission(hook As Func(Of Entity, Type, Boolean))
