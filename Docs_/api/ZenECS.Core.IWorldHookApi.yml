  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: World-level surface for configuring read/write permissions and value validators.
  remarks: >-
    <p>

    Component APIs use this hook interface to decide whether a read or write

    operation is allowed, and whether a value passes validation, before

    mutating world state.

    </p>

    <p>

    Typical use cases include:

    </p>

    <ul><li>Preventing structural changes during specific phases.</li><li>Enforcing server-authoritative write rules in clients.</li><li>Adding invariants or data-shape checks for components.</li><li>Temporarily locking specific entities or types.</li></ul>

    <p>

    All hooks are per-world and can be cleared/reset, which is especially

    useful in tests and editor tooling.

    </p>
  example: []
  syntax:
    content: public interface IWorldHookApi
    content.vb: Public Interface IWorldHookApi
