  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Adds an object-level validator invoked on write attempts.
  remarks: >-
    <p>

    Object-level validators are type-agnostic and see the boxed value,

    which is useful for generic checks such as "no NaN in numeric

    fields" or "no nulls in nested collections".

    </p>

    <p>

    For type-specific rules, prefer <xref href="ZenECS.Core.IWorldHookApi.AddValidator%60%601(System.Func%7b%60%600%2cSystem.Boolean%7d)" data-throw-if-not-resolved="false"></xref>.

    </p>
  example: []
  syntax:
    content: void AddValidator(Func<object, bool> hook)
    parameters:
    - id: hook
      type: System.Func{System.Object,System.Boolean}
      description: >-
        Validator delegate that receives a boxed component value and

        returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if it is considered valid, or

        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to reject the write.
    content.vb: Sub AddValidator(hook As Func(Of Object, Boolean))
