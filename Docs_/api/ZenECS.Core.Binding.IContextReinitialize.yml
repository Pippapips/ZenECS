  summary: >-
    Optional fast re-initialization path that can be used when a context

    can rebind without a full deinitialize/initialize cycle.
  remarks: >-
    If this interface is not implemented, the registry falls back to

    calling <xref href="ZenECS.Core.Binding.IContextInitialize.Deinitialize(ZenECS.Core.IWorld%2cZenECS.Core.Entity)" data-throw-if-not-resolved="false"></xref> followed by

    <xref href="ZenECS.Core.Binding.IContextInitialize.Initialize(ZenECS.Core.IWorld%2cZenECS.Core.Entity%2cZenECS.Core.Binding.IContextLookup)" data-throw-if-not-resolved="false"></xref>.
  example: []
