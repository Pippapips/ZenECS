  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Reinitializes the context when a quick rebind is possible, allowing

    reuse of existing state instead of a full teardown and re-setup.
  example: []
  syntax:
    content: void Reinitialize(IWorld w, Entity e, IContextLookup l)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity the context is attached to.
    - id: l
      type: ZenECS.Core.Binding.IContextLookup
      description: Lookup service for resolving other contexts.
    content.vb: Sub Reinitialize(w As IWorld, e As Entity, l As IContextLookup)
  overload: ZenECS.Core.Binding.IContextReinitialize.Reinitialize*
