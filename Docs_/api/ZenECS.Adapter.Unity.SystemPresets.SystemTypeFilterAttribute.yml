  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: Attribute used to filter selectable types in a custom inspector.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeFilterAttribute" data-throw-if-not-resolved="false"></xref> is intended to be consumed by a

    custom <code>PropertyDrawer</code> that renders a type picker (for example,

    for <code>SystemTypeRef</code>). The drawer is expected to:

    </p>

    <ul><li>

    Restrict the list of candidate types to those assignable to

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeFilterAttribute.BaseType" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    Optionally exclude abstract types when <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeFilterAttribute.AllowAbstract" data-throw-if-not-resolved="false"></xref> is

    <code>false</code>.

    </li></ul>

    <p>

    Example usage:

    </p>


    <pre><code class="lang-csharp">[SystemTypeFilter(typeof(ISystem), allowAbstract: false)]

    public SystemTypeRef[] systems;</code></pre>
  example: []
  syntax:
    content: >-
      [AttributeUsage(AttributeTargets.Property|AttributeTargets.Field, AllowMultiple = false)]

      public sealed class SystemTypeFilterAttribute : PropertyAttribute
    content.vb: >-
      <AttributeUsage(AttributeTargets.PropertyOrAttributeTargets.Field, AllowMultiple:=False)>

      Public NotInheritable Class SystemTypeFilterAttribute Inherits PropertyAttribute
