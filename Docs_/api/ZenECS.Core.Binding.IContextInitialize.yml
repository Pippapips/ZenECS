    startLine: 162
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Called when the context is removed, or when the entity or world

    is being destroyed. Implementations should release resources and

    unsubscribe from any external systems here.
  example: []
  syntax:
    content: void Deinitialize(IWorld w, Entity e)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity the context was attached to.
    content.vb: Sub Deinitialize(w As IWorld, e As Entity)
