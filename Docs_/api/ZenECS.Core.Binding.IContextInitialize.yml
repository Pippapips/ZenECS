  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core.Binding
  summary: >-
    Called once when the context is first registered for the entity.

    Implementations may resolve additional contexts via

    <code class="paramref">l</code> and cache any required state.
  example: []
  syntax:
    content: void Initialize(IWorld w, Entity e, IContextLookup l)
    parameters:
    - id: w
      type: ZenECS.Core.IWorld
      description: World that owns the entity.
    - id: e
      type: ZenECS.Core.Entity
      description: Entity the context is attached to.
    - id: l
      type: ZenECS.Core.Binding.IContextLookup
      description: Lookup service for resolving other contexts.
    content.vb: Sub Initialize(w As IWorld, e As Entity, l As IContextLookup)
