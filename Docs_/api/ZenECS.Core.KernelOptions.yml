  namespace: ZenECS.Core
  summary: Gets or sets the prefix used when auto-naming worlds that omit an explicit name.
  remarks: >-
    The final auto name is typically constructed as

    <code>{AutoNamePrefix}{shortId}</code>, where <code>shortId</code> is a shortened

    representation of the generated <xref href="ZenECS.Core.WorldId" data-throw-if-not-resolved="false"></xref>.
  example: []
