    startLine: 83
  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: >-
    Gets or sets a value indicating whether the kernel should step only the

    <em>current</em> world (if one is selected) or all worlds.
  remarks: >-
    When set to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, calls to

    <xref href="ZenECS.Core.IKernel.BeginFrame(System.Single)" data-throw-if-not-resolved="false"></xref>,

    <xref href="ZenECS.Core.IKernel.FixedStep(System.Single)" data-throw-if-not-resolved="false"></xref>, and

    <xref href="ZenECS.Core.IKernel.LateFrame(System.Single)" data-throw-if-not-resolved="false"></xref> will drive only the

    <xref href="ZenECS.Core.IKernel.CurrentWorld" data-throw-if-not-resolved="false"></xref> (if non-null).
  example: []
  syntax:
    content: public bool StepOnlyCurrentWhenSelected { get; set; }
    parameters: []
    return:
      type: System.Boolean
      description: 'Default: <code>false</code> (step all worlds).'
    content.vb: Public Property StepOnlyCurrentWhenSelected As Boolean
  overload: ZenECS.Core.KernelOptions.StepOnlyCurrentWhenSelected*
