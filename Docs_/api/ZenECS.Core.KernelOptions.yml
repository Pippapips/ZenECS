  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Configures <xref href="ZenECS.Core.IKernel" data-throw-if-not-resolved="false"></xref> behavior for world creation and frame stepping.
  remarks: >-
    <p>

    This type is intended to be stable; adapters and host applications should

    be able to rely on it as a durable configuration surface.

    </p>

    <p>Typical usage:</p>


    <pre><code class="lang-csharp">var options = new KernelOptions

    {
        AutoNamePrefix = "Game-",
        AutoSelectNewWorld = true,
        StepOnlyCurrentWhenSelected = true,
        NewWorldIdFactory = () =&gt; new WorldId(MyDeterministicGuidSource.Next())
    };

    using var kernel = new Kernel(options);

    var world = kernel.CreateWorld(name: "Main");

    // Game loop:

    kernel.BeginFrame(dt);

    kernel.FixedStep(fixedDelta);

    kernel.LateFrame(alpha);</code></pre>
  example: []
  syntax:
    content: public sealed class KernelOptions
    content.vb: Public NotInheritable Class KernelOptions
