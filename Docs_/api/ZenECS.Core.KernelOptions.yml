  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: >-
    Gets or sets a value indicating whether the kernel may automatically set

    newly created worlds as the <em>current</em> world.
  remarks: >-
    This is a global default only. Callers can override the behavior per call

    using the <code>setAsCurrent</code> parameter of

    <xref href="ZenECS.Core.IKernel.CreateWorld(System.Nullable%7bZenECS.Core.WorldConfig%7d%2cSystem.String%2cSystem.Collections.Generic.IEnumerable%7bSystem.String%7d%2cSystem.Nullable%7bZenECS.Core.WorldId%7d%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>.
