  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Manages the lifecycle, lookup and ticking of multiple worlds.
  remarks: >-
    <p>

    External code must interact with world state via the world's API surfaces,

    not through kernel internals. The kernel is responsible for:

    </p>

    <ul><li>Creating and destroying worlds and their DI scopes.</li><li>Indexing worlds by id, name, and tags.</li><li>Stepping all or a single selected world.</li><li>Tracking global time counters for frames and fixed steps.</li></ul>
  example: []
