  summary: Raised when a component is added to an entity.
  remarks: >-
    The <xref href="System.Type" data-throw-if-not-resolved="false"></xref> argument is the component type (e.g., <code>typeof(MyComponent)</code>),

    and the <xref href="System.Object" data-throw-if-not-resolved="false"></xref> argument is the boxed component value at the time of addition.
