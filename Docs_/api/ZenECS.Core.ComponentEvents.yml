  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Global event hub for component lifecycle notifications.
  remarks: >-
    <p>

    These events are raised by the world implementation to inform tools and

    observers when components are added to or removed from entities.

    They are <b>not</b> intended to be used for core gameplay logic;

    prefer systems, queries, and message buses for that.

    </p>

    <p>

    Events are fired per-world and always carry the target

    <xref href="ZenECS.Core.IWorld" data-throw-if-not-resolved="false"></xref> instance and <xref href="ZenECS.Core.Entity" data-throw-if-not-resolved="false"></xref> handle, plus

    the component <xref href="System.Type" data-throw-if-not-resolved="false"></xref> (and value for additions).

    </p>

    <p>

    Handlers should be <i>exception-safe</i>. Exceptions thrown from

    subscribers will propagate to the caller that raised the event.

    </p>
  example: []
  syntax:
    content: public static class ComponentEvents
    content.vb: Public Module ComponentEvents
