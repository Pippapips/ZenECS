  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: Resolves the stored assembly-qualified name into a <xref href="System.Type" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    <p>

    This method returns <code>null</code> when:

    </p>

    <ul><li>

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef.AssemblyQualifiedName" data-throw-if-not-resolved="false"></xref> is <code>null</code>, empty, or

    whitespace.

    </li><li>

    <xref href="System.Type.GetType(System.String%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> cannot resolve the type

    (for example, the assembly is missing or the name has changed).

    </li></ul>
  example: []
  syntax:
    content: public readonly Type? Resolve()
    return:
      type: System.Type
      description: The resolved <xref href="System.Type" data-throw-if-not-resolved="false"></xref> if successful; otherwise <code>null</code>.
    content.vb: Public Function Resolve() As Type
