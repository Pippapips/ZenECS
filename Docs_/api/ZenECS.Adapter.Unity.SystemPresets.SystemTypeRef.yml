  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.SystemPresets
  summary: Runtime-safe type reference stored as an assembly-qualified name.
  remarks: >-
    <p>

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef" data-throw-if-not-resolved="false"></xref> is a lightweight value type that keeps the

    assembly-qualified name of a type (for example

    <code>"MyGame.MovementSystem, MyGame.Assembly"</code>) and can resolve it

    back to a <xref href="System.Type" data-throw-if-not-resolved="false"></xref> at runtime.

    </p>

    <p>

    Typical usage:

    </p>

    <ol><li>

    In the editor, a custom inspector presents a type picker (for example,

    a <code>MonoScript</code>-based UI) and stores the selected type's

    <xref href="System.Type.AssemblyQualifiedName" data-throw-if-not-resolved="false"></xref> into

    <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef.AssemblyQualifiedName" data-throw-if-not-resolved="false"></xref>.

    </li><li>

    At runtime, <xref href="ZenECS.Adapter.Unity.SystemPresets.SystemTypeRef.Resolve" data-throw-if-not-resolved="false"></xref> is called to obtain the actual

    <xref href="System.Type" data-throw-if-not-resolved="false"></xref> instance, or <code>null</code> if resolution fails.

    </li></ol>
  example: []
  syntax:
    content: >-
      [Serializable]

      public struct SystemTypeRef
    content.vb: >-
      <Serializable>

      Public Structure SystemTypeRef
