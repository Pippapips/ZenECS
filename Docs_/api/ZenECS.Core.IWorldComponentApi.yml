  assemblies:
  - ZenECS.Core
  namespace: ZenECS.Core
  summary: Dispatches a snapshot delta for an existing component without changing its value.
  remarks: >-
    <p>

    A snapshot delta is typically used when a binder attaches to an entity

    and needs the current component value to be pushed as-is into the

    presentation layer (the <code>Snapshot</code> kind in <code>ComponentDeltaKind</code>).

    </p>
  example: []
  syntax:
    content: 'bool SnapshotComponent<T>(Entity e) where T : struct'
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    typeParameters:
    - id: T
      description: Component value type.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if the entity has the component and a snapshot

        was dispatched; otherwise <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.
    content.vb: Function SnapshotComponent(Of T As Structure)(e As Entity) As Boolean
  overload: ZenECS.Core.IWorldComponentApi.SnapshotComponent*
  nameWithType.vb: IWorldComponentApi.SnapshotComponent(Of T)(Entity)
  fullName.vb: ZenECS.Core.IWorldComponentApi.SnapshotComponent(Of T)(ZenECS.Core.Entity)
