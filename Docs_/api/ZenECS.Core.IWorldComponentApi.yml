  namespace: ZenECS.Core
  summary: >-
    Dispatches a snapshot delta for a component whose type is inferred

    from a boxed value.
  example: []
  syntax:
    content: bool SnapshotComponentBoxed(Entity e, object? boxed)
    parameters:
    - id: e
      type: ZenECS.Core.Entity
      description: Target entity.
    - id: boxed
      type: System.Object
      description: >-
        Boxed component value; its runtime type is used to resolve the component

        type. Implementations may require this to be a non-null value type.
    return:
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> if a matching component exists and a snapshot

