  source:
    remote:
      path: Packages/com.zenecs.adapter.unity/Runtime/Linking/EntityViewRegistry.cs
      branch: main
      repo: https://github.com/Pippapips/ZenECS.git
    id: EnumerateViews
    path: ../Packages/com.zenecs.adapter.unity/Runtime/Linking/EntityViewRegistry.cs
    startLine: 275
  assemblies:
  - ZenECS.Adapter.Unity
  namespace: ZenECS.Adapter.Unity.Linking
  summary: Enumerates all entity-link pairs registered in this registry.
  remarks: >-
    <p>

    This method iterates through all entries in the internal dictionary

    and filters out entries based on <code class="paramref">aliveOnly</code>:

    </p>

    <ul><li>

    When <code class="paramref">aliveOnly</code> is <code>true</code>, only links that are

    non-null and report <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.IsAlive" data-throw-if-not-resolved="false"></xref> as <code>true</code>

    are included.

    </li><li>

    When <code class="paramref">aliveOnly</code> is <code>false</code>, all non-null links

    are included regardless of their alive status.

    </li></ul>

    <p>

    The enumeration is performed lazily, so modifications to the registry

    during enumeration may affect the results. It is recommended to avoid

    modifying the registry while iterating over the results.

    </p>

    <p>

    Typical usage:

    </p>


    <pre><code class="lang-csharp">var registry = EntityViewRegistry.For(world);

    foreach (var (entity, link) in registry.EnumerateViews(aliveOnly: true))

    {
        Debug.Log($"Entity {entity.Id} → {link.gameObject.name}");
    }</code></pre>
  example: []
  syntax:
    content: public IEnumerable<(Entity Entity, EntityLink Link)> EnumerateViews(bool aliveOnly = false)
    parameters:
    - id: aliveOnly
      type: System.Boolean
      description: >-
        If <code>true</code>, only includes links where <xref href="ZenECS.Adapter.Unity.Linking.EntityLink.IsAlive" data-throw-if-not-resolved="false"></xref>

        is <code>true</code>. If <code>false</code>, includes all non-null links regardless

        of their alive status.
    return:
      type: System.Collections.Generic.IEnumerable{System.ValueTuple{ZenECS.Core.Entity,ZenECS.Adapter.Unity.Linking.EntityLink}}
      description: >-
        An enumerable sequence of tuples containing the <xref href="ZenECS.Core.Entity" data-throw-if-not-resolved="false"></xref>

        and its associated <xref href="ZenECS.Adapter.Unity.Linking.EntityLink" data-throw-if-not-resolved="false"></xref>. The filtering behavior

        depends on <code class="paramref">aliveOnly</code>.
    content.vb: Public Function EnumerateViews(aliveOnly As Boolean = False) As IEnumerable(Of (Entity As Entity, Link As EntityLink))
  overload: ZenECS.Adapter.Unity.Linking.EntityViewRegistry.Registry.EnumerateViews*
  nameWithType.vb: EntityViewRegistry.Registry.EnumerateViews(Boolean)
  fullName.vb: ZenECS.Adapter.Unity.Linking.EntityViewRegistry.Registry.EnumerateViews(Boolean)
  name.vb: EnumerateViews(Boolean)
